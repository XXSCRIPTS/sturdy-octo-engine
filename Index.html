<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff0000; --bg: #010101; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroller { scrollbar-width: none; overflow-y: auto; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; }
        .mac-window { background: #000; border-radius: 40px; border: 1px solid #111; box-shadow: 0 40px 100px rgba(0,0,0,1); transition: 0.5s; }
        
        .btn-main { background: linear-gradient(135deg, var(--accent), #770000); padding: 14px 28px; border-radius: 100px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,0,0,0.3); }

        input, textarea { background: rgba(255,255,255,0.02) !important; border: 1px solid rgba(255,255,255,0.06) !important; color: #fff !important; border-radius: 15px !important; padding: 15px !important; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent) !important; }

        .theme-card { padding: 30px; border-radius: 25px; cursor: pointer; text-align: center; font-weight: 800; font-size: 11px; text-transform: uppercase; border: 2px solid transparent; transition: 0.3s; }
        .theme-card:hover { border-color: white; transform: scale(1.02); }

        .editor-node { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 12px; cursor: pointer; position: relative; }
        .editor-node.active { border-color: var(--accent); background: rgba(255,0,0,0.03); }

        #icon-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 10000; padding: 50px; flex-direction: column; }
        .icon-item { padding: 15px; background: rgba(255,255,255,0.02); border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .icon-item:hover { background: var(--accent); border-color: white; }
    </style>
</head>
<body class="flex">

    <div id="icon-modal">
        <div class="flex justify-between items-center mb-10 max-w-6xl mx-auto w-full">
            <div>
                <h3 class="text-3xl font-black italic uppercase">Lucide <span class="text-red-600">Library</span></h3>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-2">1,695 Icons Available</p>
            </div>
            <input type="text" id="icon-search" placeholder="Search icons..." class="w-1/3" oninput="renderIcons(this.value)">
            <button onclick="closeIconModal()" class="btn-main">CLOSE</button>
        </div>
        <div class="max-w-6xl mx-auto w-full flex-1 scroller glass p-8">
            <div class="grid grid-cols-10 gap-4" id="icon-container"></div>
        </div>
    </div>

    <aside class="w-80 bg-black border-r border-white/5 flex flex-col p-10">
        <div class="mb-16">
            <h1 class="text-4xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V24</span></h1>
            <div class="h-1 w-10 bg-red-600 mt-2"></div>
        </div>
        <nav class="space-y-4 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-6 rounded-[25px] bg-white/5 font-bold text-xs uppercase tracking-widest border border-white/10">Architect</button>
            <button onclick="compile(); nav('edit-script')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">The Pad</button>
            <button onclick="nav('theme')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Cosmetics</button>
        </nav>
    </aside>

    <main class="flex-1 p-16 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-end mb-12">
                <h2 class="text-2xl font-bold uppercase italic tracking-tighter">System Configuration</h2>
                <button onclick="compile(); nav('edit-script')" class="btn-main"><i class="fas fa-terminal mr-2"></i> Compile to Pad</button>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-6">
                    <div class="glass p-8">
                        <label class="text-[8px] font-bold text-zinc-600 uppercase mb-2 block">Project Title</label>
                        <input type="text" id="ui-name" oninput="updatePrev()" value="WindUI Hub" class="!text-2xl !font-bold !bg-transparent !border-none !p-0 w-full">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="add('Tab')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Tab</button>
                        <button onclick="add('Section')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Section</button>
                        <button onclick="add('Button')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Button</button>
                        <button onclick="add('Toggle')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Toggle</button>
                        <button onclick="add('Slider')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Slider</button>
                        <button onclick="add('Dropdown')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Drop</button>
                        <button onclick="add('Input')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Input</button>
                        <button onclick="add('Paragraph')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600">Para</button>
                    </div>

                    <div id="node-editor" class="glass p-8 hidden border-red-600/20">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-black text-red-600 uppercase">Edit Element</span>
                            <button id="icon-btn" onclick="openIconModal()" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg hidden">SELECT ICON</button>
                        </div>
                        <div id="editor-fields" class="space-y-6 max-h-[350px] scroller pr-2"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window h-[650px] flex flex-col">
                        <div class="p-10 border-b border-white/5 flex flex-col items-center">
                            <span id="prev-window-name" class="text-4xl font-black italic uppercase">WindUI Hub</span>
                        </div>
                        <div class="flex-1 flex overflow-hidden">
                            <div class="w-64 border-r border-white/5 p-6 space-y-3 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-10 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-edit-script" class="tab-content hidden h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-4xl font-black italic uppercase">The <span class="text-red-600">Pad</span></h2>
                    <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-2">Professional Script Refiner</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="copySnippet('dialog')" class="bg-zinc-900/50 border border-white/5 px-6 py-4 rounded-2xl text-[10px] font-black uppercase hover:border-red-600">+ Dialog</button>
                    <button onclick="copySnippet('popup')" class="bg-zinc-900/50 border border-white/5 px-6 py-4 rounded-2xl text-[10px] font-black uppercase hover:border-red-600">+ Popup</button>
                    <button onclick="copySnippet('notify')" class="bg-zinc-900/50 border border-white/5 px-6 py-4 rounded-2xl text-[10px] font-black uppercase hover:border-red-600">+ Notify</button>
                    <button onclick="copyFinal()" class="btn-main">Copy Final Build</button>
                </div>
            </div>
            <div class="flex-1 glass overflow-hidden flex flex-col">
                <textarea id="script-pad" class="w-full h-full p-12 bg-transparent font-mono text-sm text-red-500 !border-none !rounded-none resize-none scroller" spellcheck="false"></textarea>
            </div>
        </div>

        <div id="t-theme" class="tab-content hidden">
            <h2 class="text-3xl font-black italic mb-10 uppercase">Theme <span class="text-red-600">Engine</span></h2>
            <div class="grid grid-cols-4 gap-6" id="theme-grid"></div>
        </div>

    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let activeSection = null;
        let editingId = null;
        let currentTheme = "Dark";
        const iconNames = Object.keys(lucide.icons);

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function renderThemes() {
            const themes = [
                { name: 'Dark', bg: '#000', accent: '#ff0000' },
                { name: 'Light', bg: '#fff', accent: '#ff0000' },
                { name: 'Rose', bg: '#0a0000', accent: '#e11d48' },
                { name: 'Plant', bg: '#000a00', accent: '#166534' },
                { name: 'Sky', bg: '#00050a', accent: '#0284c7' },
                { name: 'Emerald', bg: '#000a05', accent: '#059669' },
                { name: 'Indigo', bg: '#00000a', accent: '#4f46e5' },
                { name: 'Amber', bg: '#0a0500', accent: '#d97706' }
            ];
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = themes.map(t => `
                <div class="theme-card" style="background:${t.bg}; color:${t.bg === '#fff' ? '#000':'#fff'}" onclick="setTheme('${t.name}', '${t.bg}', '${t.accent}')">
                    ${t.name}
                </div>
            `).join('');
        }

        function setTheme(n, b, a) { currentTheme = n; document.getElementById('prev-window').style.backgroundColor = b; document.documentElement.style.setProperty('--accent', a); }

        function openIconModal() { document.getElementById('icon-modal').style.display='flex'; renderIcons(""); }
        function closeIconModal() { document.getElementById('icon-modal').style.display='none'; }
        function renderIcons(q) {
            const container = document.getElementById('icon-container'); container.innerHTML = '';
            iconNames.filter(n => n.includes(q.toLowerCase())).slice(0, 400).forEach(name => {
                const div = document.createElement('div'); div.className = 'icon-item';
                div.innerHTML = `<i data-lucide="${name}" style="margin:auto; width:20px;"></i><p class="text-[6px] mt-2 font-black uppercase">${name}</p>`;
                div.onclick = () => { elements.find(x => x.id === editingId).icon = name; updatePrev(); closeIconModal(); };
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function add(type) {
            const id = Date.now();
            const el = { id, type, title: `New ${type}`, desc: "Enter details here...", code: 'print("Execution Success")', tabId: activeTab, sectionId: (type === 'Section' ? null : activeSection), min: 0, max: 100, def: 50, options: "Option 1, Option 2", icon: "box" };
            if(type === 'Tab') { el.tabId = id; activeTab = id; activeSection = null; }
            if(type === 'Section') { el.tabId = activeTab; activeSection = id; }
            elements.push(el);
            updatePrev();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const fields = document.getElementById('editor-fields');
            document.getElementById('node-editor').classList.remove('hidden');
            document.getElementById('icon-btn').style.display = el.type === 'Tab' ? 'block' : 'none';
            
            let h = `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Display Name</label><input type="text" value="${el.title}" class="w-full" oninput="updateNode(${id}, 'title', this.value)"></div>`;
            
            if(el.type === 'Paragraph') {
                h += `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Description</label><textarea oninput="updateNode(${id}, 'desc', this.value)" class="w-full">${el.desc}</textarea></div>`;
            } else if(el.type !== 'Tab' && el.type !== 'Section') {
                h += `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Lua Logic</label><textarea oninput="updateNode(${id}, 'code', this.value)" class="h-32 w-full font-mono text-xs">${el.code}</textarea></div>`;
            }

            if(el.type === 'Slider') {
                h += `<div class="grid grid-cols-3 gap-2">
                    <div><label class="text-[7px] font-bold text-zinc-600 uppercase">Min</label><input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)"></div>
                    <div><label class="text-[7px] font-bold text-zinc-600 uppercase">Max</label><input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)"></div>
                    <div><label class="text-[7px] font-bold text-zinc-600 uppercase">Def</label><input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)"></div>
                </div>`;
            }
            if(el.type === 'Dropdown') {
                h += `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Values (Comma Separated)</label><textarea oninput="updateNode(${id}, 'options', this.value)">${el.options}</textarea></div>`;
            }

            fields.innerHTML = h;
        }

        function updateNode(id, k, v) { const el = elements.find(x => x.id === id); if(el) el[k] = v; if(el.type === 'Section' && k === 'title') activeSection = id; updatePrev(); }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.className = `p-4 rounded-2xl text-[10px] font-black uppercase cursor-pointer flex items-center gap-3 ${activeTab === t.id ? 'bg-white text-black' : 'text-zinc-500 hover:text-white'}`;
                d.innerHTML = `<i data-lucide="${t.icon}" style="width:14px"></i><span>${t.title}</span>`;
                d.onclick = () => { activeTab = t.id; activeSection = null; updatePrev(); openEditor(t.id); };
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.className = `editor-node ${activeSection === e.id ? 'active' : ''}`;
                    d.onclick = () => { if(e.type === 'Section') activeSection = e.id; openEditor(e.id); updatePrev(); };
                    d.innerHTML = `<p class="text-[7px] text-red-600 font-black uppercase">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4>`;
                    if(e.sectionId) d.style.marginLeft = "30px";
                    cList.appendChild(d);
                });
            }
            lucide.createIcons();
        }

        function compile() {
            let lua = `-- WindUI Initialization\n`;
            lua += `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n`;
            lua += `    Title = "${document.getElementById('ui-name').value}",\n`;
            lua += `    Author = ".ftgs",\n`;
            lua += `    Theme = "${currentTheme}",\n`;
            lua += `    Transparent = true\n`;
            lua += `})\n\n`;
            
            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({\n`;
                lua += `    Title = "${t.title}",\n`;
                lua += `    Icon = "${t.icon}"\n`;
                lua += `})\n\n`;

                const sections = elements.filter(x => x.tabId === t.id && x.type === 'Section');
                sections.forEach(s => {
                    const sVar = s.title.replace(/\s/g, '');
                    lua += `local ${sVar} = ${tVar}:Section({\n`;
                    lua += `    Title = "${s.title}"\n`;
                    lua += `})\n\n`;
                    elements.filter(x => x.sectionId === s.id).forEach(e => lua += buildFullLua(sVar, e));
                });

                elements.filter(x => x.tabId === t.id && x.type !== 'Tab' && x.type !== 'Section' && !x.sectionId).forEach(e => {
                    lua += buildFullLua(tVar, e);
                });
            });
            document.getElementById('script-pad').value = lua;
        }

        function buildFullLua(parent, e) {
            let res = `local ${e.title.replace(/\s/g, '')} = ${parent}:${e.type}({\n`;
            res += `    Title = "${e.title}",\n`;
            
            if(e.type === 'Paragraph') {
                return res + `    Desc = "${e.desc}"\n})\n\n`;
            }
            
            if(e.type === 'Slider') {
                res += `    Value = {\n`;
                res += `        Min = ${e.min},\n`;
                res += `        Max = ${e.max},\n`;
                res += `        Default = ${e.def}\n`;
                res += `    },\n`;
            } else if(e.type === 'Dropdown') {
                res += `    Values = {\n`;
                res += `        ${e.options.split(',').map(o => '"' + o.trim() + '"').join(',\n        ')}\n`;
                res += `    },\n`;
            }
            
            res += `    Callback = function(value)\n`;
            res += `        ${e.code.replace(/\n/g, '\n        ')}\n`;
            res += `    end\n`;
            res += `})\n\n`;
            return res;
        }

        function copySnippet(type) {
            const data = {
                dialog: `local Dialog = Window:Dialog({\n    Title = "Confirm Action",\n    Content = "Are you sure?",\n    Buttons = {\n        {\n            Title = "Yes",\n            Callback = function()\n                print("Confirmed")\n            end\n        },\n        {\n            Title = "No",\n            Callback = function()\n                print("Cancelled")\n            end\n        }\n    }\n})`,
                popup: `local Popup = WindUI:Popup({\n    Title = "Welcome",\n    Content = "Welcome to our application!",\n    Buttons = {\n        {\n            Title = "Get Started",\n            Callback = function()\n                print("Getting started...")\n            end\n        }\n    }\n})`,
                notify: `WindUI:Notify({\n    Title = "Success",\n    Content = "Operation completed successfully",\n    Duration = 3\n})`
            };
            const pad = document.getElementById('script-pad');
            pad.value += "\n" + data[type] + "\n";
            alert("Snippet Injected into Pad!");
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('script-pad').value); alert("V24 Export Successful!"); }
        updatePrev();
    </script>
</body>
                    </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff0000; --bg: #010101; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroller { scrollbar-width: none; overflow-y: auto; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; }
        .mac-window { background: #000; border-radius: 40px; border: 1px solid #111; box-shadow: 0 40px 100px rgba(0,0,0,1); }
        
        .btn-main { background: linear-gradient(135deg, var(--accent), #770000); padding: 12px 24px; border-radius: 100px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; }

        /* THE PAD EXCLUSIVE STYLING */
        #pad-workspace { background: #050505; border: 2px solid #111; border-radius: 25px; padding: 40px; }
        .pad-block { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; border-radius: 15px; font-family: 'JetBrains Mono', monospace; font-size: 12px; position: relative; color: #ff4444; white-space: pre; margin-bottom: 20px; transition: 0.3s; }
        .edit-mode-on .pad-block { cursor: move; border-color: var(--accent); background: #0f0000; }
        .edit-mode-on .pad-block:hover { transform: scale(1.01); box-shadow: 0 0 20px rgba(255,0,0,0.1); }

        .theme-button { padding: 15px; border-radius: 12px; font-weight: 800; font-size: 10px; text-align: center; text-transform: uppercase; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .theme-button:hover { border-color: white; transform: translateY(-2px); }

        #topbar-editor { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex">

    <div id="topbar-editor">
        <div class="glass p-12 w-[500px] space-y-6">
            <h3 class="text-2xl font-black italic uppercase">Open Button <span class="text-red-600">Editor</span></h3>
            <div class="space-y-4">
                <input type="text" id="top-title" value="Open Example UI" class="w-full bg-white/5 p-4 rounded-xl border border-white/10 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="top-hex1" value="FF0F7B" placeholder="Hex Color 1">
                    <input type="text" id="top-hex2" value="F89B29" placeholder="Hex Color 2">
                </div>
                <div class="flex items-center gap-4 p-4 glass rounded-xl">
                    <span class="text-[10px] font-bold uppercase">Mobile Only</span>
                    <input type="checkbox" id="top-mobile" class="w-5 h-5 accent-red-600">
                </div>
            </div>
            <button onclick="document.getElementById('topbar-editor').style.display='none'" class="btn-main w-full">Save Changes</button>
        </div>
    </div>

    <aside class="w-80 bg-black border-r border-white/5 flex flex-col p-10">
        <div class="mb-16">
            <h1 class="text-4xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V27</span></h1>
        </div>
        <nav class="space-y-4 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-6 rounded-[25px] bg-white/5 font-bold text-xs uppercase tracking-widest border border-white/10">Architect</button>
            <button onclick="compile(); nav('pad')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white">The Pad</button>
            <button onclick="nav('theme')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white">Themes</button>
        </nav>
    </aside>

    <main class="flex-1 p-16 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-end mb-12">
                <h2 class="text-2xl font-black uppercase italic">Architectural Workspace</h2>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('topbar-editor').style.display='flex'" class="btn-main bg-zinc-800">Edit Top Bar</button>
                    <button onclick="compile(); nav('pad')" class="btn-main">Export to Pad</button>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-6">
                    <div class="glass p-8">
                        <label class="text-[8px] font-black uppercase text-zinc-500 mb-2 block">Project Name</label>
                        <input type="text" id="ui-name" oninput="updatePrev()" value="WindUI Hub" class="!text-2xl !font-bold !bg-transparent !border-none !p-0 w-full outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="add('Tab')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Tab</button>
                        <button onclick="add('Section')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Section</button>
                        <button onclick="add('Button')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Button</button>
                        <button onclick="add('Toggle')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Toggle</button>
                        <button onclick="add('Slider')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Slider</button>
                        <button onclick="add('Dropdown')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Drop</button>
                        <button onclick="add('Input')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Input</button>
                        <button onclick="add('Paragraph')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Para</button>
                    </div>

                    <div id="node-editor" class="glass p-8 hidden border-red-600/20 max-h-[400px] scroller">
                        <div id="editor-fields" class="space-y-4"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window h-[600px] flex flex-col overflow-hidden">
                        <div class="p-10 border-b border-white/5 flex justify-center">
                            <span id="prev-window-name" class="text-4xl font-black italic uppercase">WindUI Hub</span>
                        </div>
                        <div class="flex-1 flex overflow-hidden">
                            <div class="w-64 border-r border-white/5 p-6 space-y-3" id="prev-tabs"></div>
                            <div class="flex-1 p-10 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-pad" class="tab-content hidden h-full flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-black italic">THE <span class="text-red-600">PAD</span></h2>
                    <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-2">Code Block Manipulation Chamber</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="togglePadEdit()" id="pad-edit-btn" class="btn-main !from-orange-500 !to-orange-700">Edit Mode: OFF</button>
                    <button onclick="copySnippet('dialog')" class="bg-zinc-900 px-6 py-4 rounded-2xl text-[10px] font-black uppercase hover:text-red-600">+ Dialog</button>
                    <button onclick="copySnippet('notify')" class="bg-zinc-900 px-6 py-4 rounded-2xl text-[10px] font-black uppercase hover:text-red-600">+ Notify</button>
                    <button onclick="copyFullPad()" class="btn-main">Copy Final Script</button>
                </div>
            </div>
            
            <div id="pad-workspace" class="flex-1 scroller">
                </div>
        </div>

        <div id="t-theme" class="tab-content hidden">
            <h2 class="text-3xl font-black italic mb-10">OFFICIAL <span class="text-red-600">THEMES</span></h2>
            <div class="grid grid-cols-4 gap-4" id="official-theme-grid"></div>
        </div>

    </main>

    <script>
        let elements = [];
        let padBlocks = [];
        let activeTab = null;
        let activeSection = null;
        let currentTheme = "Dark";
        let isPadEdit = false;

        const officialThemes = [
            { name: "Dark", color: "#1a1a1a" }, { name: "Light", color: "#ffffff" },
            { name: "Rose", color: "#e11d48" }, { name: "Plant", color: "#166534" },
            { name: "Sky", color: "#0ea5e9" }, { name: "Indigo", color: "#4f46e5" },
            { name: "Violet", color: "#8b5cf6" }, { name: "Amber", color: "#f59e0b" },
            { name: "Emerald", color: "#10b981" }, { name: "Midnight", color: "#0f172a" },
            { name: "Crimson", color: "#991b1b" }, { name: "Monokai Pro", color: "#f97316" },
            { name: "Cotton Candy", color: "#ec4899" }, { name: "Mellowsi", color: "#78350f" },
            { name: "Rainbow", color: "linear-gradient(to right, #22d3ee, #818cf8)" }
        ];

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function renderThemes() {
            const grid = document.getElementById('official-theme-grid');
            grid.innerHTML = officialThemes.map(t => `
                <div class="theme-button" style="background:${t.color}; color:${t.name==='Light'?'#000':'#fff'}" onclick="setTheme('${t.name}')">
                    ${t.name}
                </div>
            `).join('');
        }

        function setTheme(n) { currentTheme = n; alert("Theme Set: " + n); }

        function add(type) {
            const id = Date.now();
            const el = { id, type, title: `New ${type}`, desc: "Enter description here", code: 'print("Executed")', tabId: activeTab, sectionId: (type === 'Section' ? null : activeSection), min: 0, max: 100, def: 50, options: "Value 1, Value 2" };
            if(type === 'Tab') { el.tabId = id; activeTab = id; activeSection = null; }
            if(type === 'Section') { el.tabId = activeTab; activeSection = id; }
            elements.push(el);
            updatePrev();
        }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.className = `p-4 rounded-2xl text-[10px] font-black uppercase cursor-pointer ${activeTab === t.id ? 'bg-white text-black' : 'text-zinc-500'}`;
                d.innerText = t.title;
                d.onclick = () => { activeTab = t.id; activeSection = null; updatePrev(); openEditor(t.id); };
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.className = `p-5 mb-2 glass rounded-2xl border-white/5 ${activeSection === e.id ? 'border-red-600' : ''}`;
                    d.innerHTML = `<p class="text-[7px] text-red-600 font-black uppercase mb-1">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4>`;
                    if(e.sectionId) d.style.marginLeft = "20px";
                    d.onclick = () => { if(e.type === 'Section') activeSection = e.id; openEditor(e.id); updatePrev(); };
                    cList.appendChild(d);
                });
            }
        }

        function openEditor(id) {
            const el = elements.find(x => x.id === id);
            const fields = document.getElementById('editor-fields');
            document.getElementById('node-editor').classList.remove('hidden');
            fields.innerHTML = `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Label</label><input type="text" value="${el.title}" class="w-full bg-white/5 p-4 rounded-xl border border-white/10" oninput="elements.find(x=>x.id===${id}).title=this.value; updatePrev()"></div>`;
            if(el.type !== 'Tab' && el.type !== 'Section') {
                fields.innerHTML += `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Callback Logic</label><textarea class="w-full h-32 bg-white/5 p-4 rounded-xl border border-white/10 font-mono text-xs" oninput="elements.find(x=>x.id===${id}).code=this.value">${el.code}</textarea></div>`;
            }
        }

        function togglePadEdit() {
            isPadEdit = !isPadEdit;
            document.getElementById('pad-edit-btn').innerText = `Edit Mode: ${isPadEdit ? 'ON' : 'OFF'}`;
            document.getElementById('pad-workspace').classList.toggle('edit-mode-on', isPadEdit);
            renderPad();
        }

        function compile() {
            padBlocks = [];
            // Init Header
            padBlocks.push({ id: 'init', content: `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\nlocal Window = WindUI:CreateWindow({\n    Title = "${document.getElementById('ui-name').value}",\n    Author = ".ftgs",\n    Theme = "${currentTheme}",\n    Transparent = true\n})` });
            
            // Edit Open Button
            padBlocks.push({ id: 'topbar', content: `Window:EditOpenButton({\n    Title = "${document.getElementById('top-title').value}",\n    Icon = "monitor",\n    CornerRadius = UDim.new(0, 16),\n    StrokeThickness = 2,\n    Color = ColorSequence.new(\n        Color3.fromHex("${document.getElementById('top-hex1').value}"),\n        Color3.fromHex("${document.getElementById('top-hex2').value}")\n    ),\n    OnlyMobile = ${document.getElementById('top-mobile').checked},\n    Enabled = true,\n    Draggable = true\n})` });

            elements.filter(e => e.type === 'Tab').forEach(t => {
                const tv = t.title.replace(/\s/g, '');
                padBlocks.push({ id: t.id, content: `local ${tv} = Window:Tab({\n    Title = "${t.title}",\n    Icon = "box"\n})` });

                elements.filter(s => s.tabId === t.id && s.type === 'Section').forEach(sec => {
                    const sv = sec.title.replace(/\s/g, '');
                    padBlocks.push({ id: sec.id, content: `local ${sv} = ${tv}:Section({\n    Title = "${sec.title}"\n})` });
                    elements.filter(item => item.sectionId === sec.id).forEach(item => padBlocks.push({ id: item.id, content: buildFullFormat(sv, item) }));
                });

                elements.filter(item => item.tabId === t.id && item.type !== 'Tab' && item.type !== 'Section' && !item.sectionId).forEach(item => {
                    padBlocks.push({ id: item.id, content: buildFullFormat(tv, item) });
                });
            });
            renderPad();
        }

        function buildFullFormat(p, e) {
            let s = `${p}:${e.type}({\n    Title = "${e.title}",\n`;
            if(e.type === 'Slider') {
                s += `    Value = {\n        Min = ${e.min},\n        Max = ${e.max},\n        Default = ${e.def}\n    },\n`;
            } else if(e.type === 'Dropdown') {
                s += `    Values = {\n        ${e.options.split(',').map(o=>'"'+o.trim()+'"').join(',\n        ')}\n    },\n`;
            }
            s += `    Callback = function(value)\n        ${e.code.replace(/\n/g, '\n        ')}\n    end\n})`;
            return s;
        }

        function movePadBlock(index, dir) {
            if(!isPadEdit) return;
            const newIdx = index + dir;
            if(newIdx < 2 || newIdx >= padBlocks.length) return; // Cant move loadstring or topbar
            [padBlocks[index], padBlocks[newIdx]] = [padBlocks[newIdx], padBlocks[index]];
            renderPad();
        }

        function renderPad() {
            const container = document.getElementById('pad-workspace');
            container.innerHTML = padBlocks.map((b, i) => `
                <div class="pad-block">
                    ${isPadEdit && i > 1 ? `<div class="absolute right-6 top-6 flex gap-4 text-zinc-500"><i onclick="movePadBlock(${i},-1)" class="fas fa-arrow-up cursor-pointer hover:text-white"></i><i onclick="movePadBlock(${i},1)" class="fas fa-arrow-down cursor-pointer hover:text-white"></i></div>` : ''}
                    ${b.content}
                </div>
            `).join('');
        }

        function copyFullPad() {
            const final = padBlocks.map(b => b.content).join('\n\n');
            navigator.clipboard.writeText(final);
            alert("V27 Full Format Copied!");
        }

        function copySnippet(type) {
            const snip = type === 'dialog' ? `local Dialog = Window:Dialog({\n    Title = "Confirm",\n    Content = "Are you sure?",\n    Buttons = {\n        {\n            Title = "Yes",\n            Callback = function() print("Yes") end\n        },\n        {\n            Title = "No",\n            Callback = function() print("No") end\n        }\n    }\n})` : `WindUI:Notify({\n    Title = "Success",\n    Content = "Action completed",\n    Duration = 3\n})`;
            padBlocks.push({ id: Date.now(), content: snip });
            renderPad();
        }

        updatePrev();
    </script>
</body>
    </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --accent: #ff0000; --bg-main: #050505; --panel: #0a0a0a; }
        body { background: var(--bg-main); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        /* --- THE BLACKHOLE --- */
        @keyframes suck { 0% { transform: scale(1) rotate(0); opacity: 1; } 100% { transform: scale(0) rotate(720deg); opacity: 0; } }
        .deleting { animation: suck 1s forwards cubic-bezier(0.5, -0.5, 0.1, 1.5); }
        .hole { position: fixed; width: 100px; height: 100px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); border-radius: 50%; z-index: 9999; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: screen; }

        /* --- MODERN SCROLLING --- */
        .scroller { overflow-y: auto; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        /* --- UI GLASSMISM --- */
        .mac-window { background: #080808; border-radius: 35px; border: 1px solid #151515; box-shadow: 0 40px 100px rgba(0,0,0,0.8); height: 650px; position: relative; overflow: hidden; }
        .node-card { background: #0c0c0c; border: 1px solid #1a1a1a; padding: 20px; border-radius: 22px; margin-bottom: 12px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .node-card:hover { border-color: var(--accent); background: #111; transform: translateY(-2px); }

        /* --- INPUTS --- */
        input, textarea { background: #0d0d0d !important; border: 1px solid #1a1a1a !important; color: #fff !important; border-radius: 15px !important; padding: 14px !important; width: 100%; font-size: 13px; }
        input:focus { border-color: var(--accent) !important; box-shadow: 0 0 15px rgba(255,0,0,0.1); }

        /* --- FLOATING EXPORT BUTTON --- */
        .export-tile {
            background: linear-gradient(135deg, #ff0000, #800000);
            padding: 20px; border-radius: 24px; font-weight: 900; text-align: center;
            text-transform: uppercase; letter-spacing: 2px; font-size: 12px;
            box-shadow: 0 10px 30px rgba(255,0,0,0.2); transition: 0.4s;
        }
        .export-tile:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(255,0,0,0.4); filter: brightness(1.2); }

        /* --- TAB RENAME OVERLAY --- */
        #rename-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 10000; align-items: center; justify-content: center; }
        .modal-box { background: #0f0f0f; padding: 40px; border-radius: 30px; border: 1px solid #222; width: 350px; }
    </style>
</head>
<body class="flex">

    <div id="rename-modal">
        <div class="modal-box">
            <h3 class="text-xs font-black uppercase text-zinc-500 mb-6 tracking-widest">Rename Element</h3>
            <input type="text" id="rename-val" class="mb-6">
            <div class="flex gap-3">
                <button onclick="saveRename()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-xs uppercase">Save</button>
                <button onclick="closeModal()" class="flex-1 bg-zinc-900 py-4 rounded-2xl font-black text-xs uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <aside class="w-80 bg-black border-r border-zinc-900 flex flex-col p-8 z-50">
        <div class="mb-12 flex items-center gap-4">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center font-black italic">D</div>
            <h1 class="text-xl font-black italic">DARKZ <span class="text-red-600">V16</span></h1>
        </div>
        
        <nav class="space-y-3 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-5 rounded-2xl bg-zinc-900 text-white font-bold text-xs uppercase tracking-tighter hover:bg-zinc-800 transition">Designer</button>
            <button onclick="nav('sec')" class="w-full text-left p-5 rounded-2xl text-zinc-500 font-bold text-xs uppercase tracking-tighter hover:text-white transition">Protection</button>
            <button onclick="nav('theme')" class="w-full text-left p-5 rounded-2xl text-zinc-500 font-bold text-xs uppercase tracking-tighter hover:text-white transition">Themes</button>
        </nav>

        <button onclick="compile()" class="export-tile w-full mt-auto">
            <i class="fas fa-file-export mr-2"></i> Export Script
        </button>
    </aside>

    <main class="flex-1 p-12 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="grid grid-cols-12 gap-12">
                
                <div class="col-span-4 space-y-6">
                    <div class="bg-zinc-950 p-8 rounded-[40px] border border-zinc-900 shadow-2xl">
                        <input type="text" id="ui-name" oninput="updatePrev()" value="Darkz Hub" class="!text-2xl !font-black !bg-transparent !border-none !p-0 mb-1">
                        <input type="text" id="ui-author" oninput="updatePrev()" value="by .ftgs" class="!text-xs !text-zinc-500 !bg-transparent !border-none !p-0">
                        
                        <div class="mt-8 pt-6 border-t border-zinc-900 flex items-center justify-between">
                            <span class="text-[10px] font-black uppercase text-zinc-400">Transparency</span>
                            <input type="checkbox" id="ui-trans" checked onchange="updatePrev()" class="w-6 h-6 accent-red-600">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="add('Tab')" class="p-5 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase hover:border-red-600 border border-transparent">Tab</button>
                        <button onclick="add('Button')" class="p-5 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase hover:border-red-600 border border-transparent">Button</button>
                        <button onclick="add('Slider')" class="p-5 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase hover:border-red-600 border border-transparent">Slider</button>
                        <button onclick="add('Dropdown')" class="p-5 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase hover:border-red-600 border border-transparent">Dropdown</button>
                    </div>

                    <div id="node-editor" class="bg-zinc-950 p-8 rounded-[40px] border border-zinc-800 hidden">
                        <h3 class="text-[10px] font-black text-red-600 uppercase mb-6 tracking-widest">Element Settings</h3>
                        <div id="editor-fields" class="space-y-5 max-h-[350px] overflow-y-auto pr-2 scroller"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window flex flex-col transition-all duration-700">
                        <div class="p-10 border-b border-zinc-900/50 flex flex-col items-center">
                            <span id="prev-window-name" class="text-4xl font-black italic uppercase tracking-tighter">Darkz Hub</span>
                            <span id="prev-author-name" class="text-[10px] font-bold text-zinc-500 mt-2 uppercase tracking-[0.3em]">by .ftgs</span>
                        </div>
                        <div class="flex flex-1 overflow-hidden">
                            <div class="w-60 border-r border-zinc-900 p-6 space-y-3 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-12 scroller" id="prev-content"></div>
                        </div>
                    </div>
                    <p class="mt-4 text-[10px] text-zinc-600 text-center uppercase font-black">Double-click a tab to rename it instantly</p>
                </div>
            </div>
        </div>

        <div id="t-theme" class="tab-content hidden grid grid-cols-3 gap-6"></div>

        <div id="t-sec" class="tab-content hidden flex justify-center items-center h-[60vh]">
            <div class="bg-zinc-950 p-12 rounded-[50px] border border-zinc-900 w-full max-w-md text-center">
                <i class="fas fa-fingerprint text-4xl text-red-600 mb-6"></i>
                <h3 class="text-xl font-black uppercase mb-8">Script Lock</h3>
                <input type="text" id="key-val" placeholder="Custom Key" class="mb-4 text-center">
                <input type="text" id="key-url" placeholder="Key System Link" class="text-center">
            </div>
        </div>

        <div id="t-export" class="tab-content hidden h-full">
            <div class="bg-zinc-950 rounded-[40px] border border-zinc-900 h-full flex flex-col overflow-hidden">
                <div class="p-8 flex justify-between items-center bg-black/50 backdrop-blur-md">
                    <span class="text-xs font-black text-red-600 uppercase">Production Source</span>
                    <button onclick="copyFinal()" class="bg-white text-black px-10 py-4 rounded-2xl text-xs font-black uppercase hover:scale-105 transition">Copy Code</button>
                </div>
                <textarea id="source-out" readonly class="flex-1 p-12 bg-black font-mono text-sm text-red-500 outline-none scroller"></textarea>
            </div>
        </div>

    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let scriptTheme = "Dark";
        let editingId = null;

        const themeData = [
            { n: "Dark", c: "#ff0000", b: "#080808" },
            { n: "Aqua", c: "#00ffff", b: "#001a1a" },
            { n: "Emerald", c: "#10b981", b: "#051a05" },
            { n: "Violet", c: "#a855f7", b: "#15001a" },
            { n: "Amber", c: "#f59e0b", b: "#1a1500" },
            { n: "Rose", c: "#f43f5e", b: "#1a050a" }
        ];

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function renderThemes() {
            const grid = document.getElementById('t-theme'); grid.innerHTML = '';
            themeData.forEach(t => {
                const card = document.createElement('div');
                card.className = `p-10 rounded-[30px] border-2 cursor-pointer transition-all ${scriptTheme === t.n ? 'border-white scale-105' : 'border-zinc-900'}`;
                card.style.background = t.b;
                card.innerHTML = `<span class="font-black uppercase text-[10px]" style="color:${t.c}">${t.n}</span>`;
                card.onclick = () => {
                    scriptTheme = t.n;
                    document.documentElement.style.setProperty('--accent', t.c);
                    document.getElementById('prev-window').style.backgroundColor = t.b;
                    renderThemes();
                };
                grid.appendChild(card);
            });
        }

        function add(type) {
            const id = Date.now();
            const el = { id, type, title: `New ${type}`, desc: "Enter description...", code: '-- Your Lua Code Here\nprint("Executed")', tabId: activeTab, min: 0, max: 100, def: 50, options: "Option 1, Option 2" };
            if(type === 'Tab') { el.tabId = id; activeTab = id; }
            elements.push(el);
            updatePrev();
        }

        function updatePrev() {
            const name = document.getElementById('ui-name').value;
            const auth = document.getElementById('ui-author').value;
            document.getElementById('prev-window-name').innerText = name;
            document.getElementById('prev-author-name').innerText = auth;
            document.getElementById('prev-window').style.opacity = document.getElementById('ui-trans').checked ? "0.85" : "1";
            
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.className = `p-4 rounded-2xl text-[10px] font-black uppercase cursor-pointer transition-all ${activeTab === t.id ? 'bg-white text-black translate-x-2' : 'text-zinc-600 hover:text-white'}`;
                d.innerHTML = `<div class="flex justify-between"><span>${t.title}</span><i onclick="deleteNode(${t.id})" class="fas fa-trash-alt opacity-20 hover:opacity-100"></i></div>`;
                d.onclick = (e) => { if(e.target.tagName !== 'I') { activeTab = t.id; updatePrev(); } };
                d.ondblclick = () => openRename(t.id);
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.id = `node-${e.id}`;
                    d.className = "node-card flex justify-between items-center cursor-pointer";
                    d.onclick = (evt) => { if(evt.target.tagName !== 'I') openEditor(e.id); };
                    d.innerHTML = `<div><p class="text-[8px] font-black text-red-600 uppercase mb-1">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4></div><i onclick="deleteNode(${e.id})" class="fas fa-minus-circle text-zinc-800"></i>`;
                    cList.appendChild(d);
                });
            }
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const editor = document.getElementById('node-editor');
            const fields = document.getElementById('editor-fields');
            editor.classList.remove('hidden');
            fields.innerHTML = `
                <input type="text" value="${el.title}" oninput="updateNode(${id}, 'title', this.value)" placeholder="Title">
                <textarea oninput="updateNode(${id}, 'desc', this.value)" placeholder="Description">${el.desc}</textarea>
                <textarea class="h-40 font-mono text-[11px]" oninput="updateNode(${id}, 'code', this.value)">${el.code}</textarea>
            `;
            if(el.type === 'Slider') {
                fields.innerHTML += `
                    <div class="grid grid-cols-3 gap-3">
                        <input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)" placeholder="Min">
                        <input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)" placeholder="Max">
                        <input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)" placeholder="Def">
                    </div>`;
            }
            if(el.type === 'Dropdown') {
                fields.innerHTML += `<textarea oninput="updateNode(${id}, 'options', this.value)" placeholder="Options (Comma Separated)">${el.options}</textarea>`;
            }
        }

        function openRename(id) { editingId = id; document.getElementById('rename-modal').style.display = 'flex'; document.getElementById('rename-val').value = elements.find(x => x.id === id).title; }
        function closeModal() { document.getElementById('rename-modal').style.display = 'none'; }
        function saveRename() { elements.find(x => x.id === editingId).title = document.getElementById('rename-val').value; updatePrev(); closeModal(); }
        function updateNode(id, k, v) { const el = elements.find(x => x.id === id); if(el) el[k] = v; updatePrev(); }

        function deleteNode(id) {
            const node = document.getElementById(`node-${id}`);
            const rect = node.getBoundingClientRect();
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.style.left = `${rect.left + rect.width/2}px`; hole.style.top = `${rect.top + rect.height/2}px`;
            document.body.appendChild(hole);
            node.classList.add('deleting');
            setTimeout(() => {
                elements = elements.filter(x => x.id !== id);
                if(activeTab === id) activeTab = null;
                updatePrev(); hole.remove();
                document.getElementById('node-editor').classList.add('hidden');
            }, 1000);
        }

        function compile() {
            const name = document.getElementById('ui-name').value;
            const auth = document.getElementById('ui-author').value;
            const trans = document.getElementById('ui-trans').checked;
            const key = document.getElementById('key-val').value;

            let lua = `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n    Title = "${name}",\n    Author = "${auth}",\n    Theme = "${scriptTheme}",\n    Transparent = ${trans}\n})\n\n`;
            
            if(key) {
                lua += `Window:KeySystem({\n    KeyValidator = function(val)\n        return val == "${key}"\n    end,\n    URL = "${document.getElementById('key-url').value}",\n    SaveKey = true\n})\n\n`;
            }

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({\n    Title = "${t.title}",\n    Icon = "bird"\n})\n\n`;
                elements.filter(x => x.tabId === t.id && x.type !== 'Tab').forEach(e => {
                    lua += `${tVar}:${e.type}({\n    Title = "${e.title}",\n    Desc = "${e.desc}",\n`;
                    if(e.type === 'Slider') lua += `    Min = ${e.min}, Max = ${e.max}, Default = ${e.def},\n`;
                    if(e.type === 'Dropdown') lua += `    Options = {${e.options.split(',').map(o => '"'+o.trim()+'"').join(', ')}},\n`;
                    lua += `    Callback = function(value)\n        ${e.code.replace(/\n/g, '\n        ')}\n    end\n})\n\n`;
                });
            });

            document.getElementById('source-out').value = lua;
            nav('export');
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('source-out').value); alert("WindUI Script Copied!"); }
        updatePrev();
    </script>
</body>
                    </html>

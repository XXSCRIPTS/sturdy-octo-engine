<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V22</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff0000; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        .scroller::-webkit-scrollbar { width: 5px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroller { scrollbar-width: thin; overflow-y: auto; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: 35px; }
        .mac-window { background: #000; border-radius: 45px; border: 1px solid #111; box-shadow: 0 50px 100px rgba(0,0,0,1); }
        
        .btn-main { background: linear-gradient(135deg, var(--accent), #990000); padding: 14px 25px; border-radius: 100px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-main:hover { transform: translateY(-2px); filter: brightness(1.2); }

        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.07) !important; color: #fff !important; border-radius: 15px !important; padding: 15px !important; font-size: 13px; }
        
        #icon-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 20000; padding: 50px; flex-direction: column; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; }
        .icon-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; }
        .icon-item:hover { background: var(--accent); }

        .editor-card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; padding: 20px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .editor-card.active { border-color: var(--accent); background: rgba(255,0,0,0.05); }

        .utility-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .utility-card { background: #080808; border: 1px solid #151515; padding: 40px 20px; border-radius: 30px; text-align: center; transition: 0.3s; cursor: pointer; }
        .utility-card:hover { border-color: var(--accent); background: #0c0c0c; transform: translateY(-5px); }
    </style>
</head>
<body class="flex">

    <div id="icon-modal">
        <div class="flex justify-between items-center mb-10 max-w-6xl mx-auto w-full">
            <h3 class="text-2xl font-black italic">BROWSE <span class="text-red-600">LUCIDE</span></h3>
            <input type="text" id="icon-search" placeholder="Search 1,695+ icons..." class="w-1/2" oninput="filterIcons()">
            <button onclick="closeIconModal()" class="btn-main">BACK</button>
        </div>
        <div class="max-w-6xl mx-auto w-full flex-1 scroller glass p-6">
            <div class="icon-grid" id="icon-container"></div>
        </div>
    </div>

    <aside class="w-80 bg-black border-r border-white/5 flex flex-col p-10 z-50">
        <div class="mb-16">
            <h1 class="text-3xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V22</span></h1>
        </div>
        <nav class="space-y-4 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-6 rounded-[25px] bg-white/5 text-white font-bold text-xs uppercase tracking-widest border border-white/10">Architect</button>
            <button onclick="nav('edit-tab')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Edit Script</button>
            <button onclick="nav('theme')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Themes</button>
        </nav>
    </aside>

    <main class="flex-1 p-16 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-end mb-12">
                <div><p class="text-[9px] font-black text-zinc-600 uppercase tracking-widest">Script Workspace</p><p class="text-2xl font-bold">Element Architecture</p></div>
                <button onclick="compile()" class="btn-main">Export Full Script</button>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-6">
                    <div class="glass p-8">
                        <input type="text" id="ui-name" oninput="updatePrev()" value="WindUI Hub" class="!text-2xl !font-bold !bg-transparent !border-none !p-0 w-full">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="add('Tab')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Tab</button>
                        <button onclick="add('Section')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Section</button>
                        <button onclick="add('Button')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Button</button>
                        <button onclick="add('Toggle')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Toggle</button>
                        <button onclick="add('Slider')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Slider</button>
                        <button onclick="add('Dropdown')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Drop</button>
                        <button onclick="add('Input')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Input</button>
                        <button onclick="add('Paragraph')" class="p-5 glass text-[10px] font-bold uppercase hover:bg-white hover:text-black">Para</button>
                    </div>

                    <div id="node-editor" class="glass p-8 hidden border-red-600/20">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-bold text-red-600 uppercase">Config</span>
                            <button id="icon-btn" onclick="openIconModal()" class="btn-main !px-4 !py-2 !rounded-lg hidden">ICON</button>
                        </div>
                        <div id="editor-fields" class="space-y-6 max-h-[400px] scroller pr-2"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window flex flex-col h-[650px]">
                        <div class="p-12 border-b border-white/5 flex flex-col items-center">
                            <span id="prev-window-name" class="text-4xl font-bold italic tracking-tighter">WindUI Hub</span>
                        </div>
                        <div class="flex-1 flex overflow-hidden">
                            <div class="w-64 border-r border-white/5 p-6 space-y-3 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-10 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-edit-tab" class="tab-content hidden">
            <h2 class="text-3xl font-black italic mb-12">UTILITY <span class="text-red-600">SNIPPETS</span></h2>
            <div class="utility-grid">
                <div class="utility-card" onclick="copySnippet('dialog')">
                    <i class="fas fa-window-maximize text-4xl text-red-600 mb-6"></i>
                    <h3 class="font-bold text-lg mb-2 uppercase">Copy Dialog</h3>
                    <p class="text-xs text-zinc-500">Interactive confirmation box</p>
                </div>
                <div class="utility-card" onclick="copySnippet('popup')">
                    <i class="fas fa-comment-dots text-4xl text-red-600 mb-6"></i>
                    <h3 class="font-bold text-lg mb-2 uppercase">Copy Popup</h3>
                    <p class="text-xs text-zinc-500">Professional welcome popup</p>
                </div>
                <div class="utility-card" onclick="copySnippet('notify')">
                    <i class="fas fa-bell text-4xl text-red-600 mb-6"></i>
                    <h3 class="font-bold text-lg mb-2 uppercase">Copy Notification</h3>
                    <p class="text-xs text-zinc-500">Corner toast alerts</p>
                </div>
            </div>
        </div>

        <div id="t-export" class="tab-content hidden h-full">
            <div class="glass h-full flex flex-col overflow-hidden">
                <div class="p-8 border-b border-white/5 flex justify-between items-center">
                    <span class="text-xs font-black text-red-600 uppercase">Full Format Script</span>
                    <button onclick="copyFinal()" class="btn-main">COPY TO CLIPBOARD</button>
                </div>
                <textarea id="source-out" readonly class="flex-1 p-12 bg-black/20 font-mono text-xs text-red-500 outline-none scroller"></textarea>
            </div>
        </div>

    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let activeSection = null;
        let editingId = null;
        const iconNames = Object.keys(lucide.icons);

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
        }

        function openIconModal() { document.getElementById('icon-modal').style.display='flex'; renderIcons(""); }
        function closeIconModal() { document.getElementById('icon-modal').style.display='none'; }
        function renderIcons(q) {
            const container = document.getElementById('icon-container'); container.innerHTML = '';
            iconNames.filter(n => n.includes(q.toLowerCase())).forEach(name => {
                const div = document.createElement('div'); div.className = 'icon-item';
                div.innerHTML = `<i data-lucide="${name}"></i><p>${name}</p>`;
                div.onclick = () => { elements.find(x => x.id === editingId).icon = name; updatePrev(); closeIconModal(); };
                container.appendChild(div);
            });
            lucide.createIcons();
        }
        function filterIcons() { renderIcons(document.getElementById('icon-search').value); }

        function add(type) {
            const id = Date.now();
            const el = { 
                id, type, title: `New ${type}`, desc: "Default description", 
                code: 'print("Hello from WindUI")', tabId: activeTab, sectionId: (type === 'Section' ? null : activeSection),
                min: 0, max: 100, def: 50, options: "Option 1, Option 2", icon: "box" 
            };
            if(type === 'Tab') { el.tabId = id; activeTab = id; activeSection = null; }
            if(type === 'Section') { el.tabId = activeTab; activeSection = id; }
            elements.push(el);
            updatePrev();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const fields = document.getElementById('editor-fields');
            document.getElementById('node-editor').classList.remove('hidden');
            document.getElementById('icon-btn').style.display = el.type === 'Tab' ? 'block' : 'none';
            
            let html = `<div><label class="text-[8px] font-bold text-zinc-500 uppercase">Object Title</label><input type="text" value="${el.title}" oninput="updateNode(${id}, 'title', this.value)"></div>`;
            
            if(el.type === 'Paragraph') {
                html += `<div><label class="text-[8px] font-bold text-zinc-500 uppercase">Desc</label><textarea oninput="updateNode(${id}, 'desc', this.value)">${el.desc}</textarea></div>`;
            } else if(el.type !== 'Tab' && el.type !== 'Section') {
                html += `<div><label class="text-[8px] font-bold text-zinc-500 uppercase">Callback Logic</label><textarea class="h-32 font-mono text-xs" oninput="updateNode(${id}, 'code', this.value)">${el.code}</textarea></div>`;
            }

            if(el.type === 'Slider') {
                html += `<div class="grid grid-cols-3 gap-2">
                    <input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)" placeholder="Min">
                    <input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)" placeholder="Max">
                    <input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)" placeholder="Def">
                </div>`;
            }
            if(el.type === 'Dropdown') {
                html += `<div><label class="text-[8px] font-bold text-zinc-500 uppercase">Values (Comma Separated)</label><textarea oninput="updateNode(${id}, 'options', this.value)">${el.options}</textarea></div>`;
            }

            fields.innerHTML = html;
        }

        function updateNode(id, k, v) { 
            const el = elements.find(x => x.id === id); 
            if(el) el[k] = v; 
            if(el.type === 'Section' && k === 'title') activeSection = id;
            updatePrev(); 
        }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.className = `p-4 rounded-2xl text-[10px] font-bold uppercase cursor-pointer flex items-center gap-3 ${activeTab === t.id ? 'bg-white text-black' : 'text-zinc-500 hover:text-white'}`;
                d.innerHTML = `<i data-lucide="${t.icon}"></i><span>${t.title}</span>`;
                d.onclick = () => { activeTab = t.id; activeSection = null; updatePrev(); openEditor(t.id); };
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.className = `editor-card ${activeSection === e.id ? 'active' : ''}`;
                    d.onclick = () => { if(e.type === 'Section') activeSection = e.id; openEditor(e.id); updatePrev(); };
                    d.innerHTML = `<p class="text-[7px] text-red-600 font-bold uppercase">${e.type}</p><h4 class="font-bold text-sm">${e.title}</h4>`;
                    if(e.sectionId) d.style.marginLeft = "30px";
                    cList.appendChild(d);
                });
            }
            lucide.createIcons();
        }

        function compile() {
            let lua = `-- WindUI Framework Initialization\n`;
            lua += `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n`;
            lua += `    Title = "${document.getElementById('ui-name').value}",\n`;
            lua += `    Author = ".ftgs",\n`;
            lua += `    Theme = "Dark",\n`;
            lua += `    Transparent = true\n`;
            lua += `})\n\n`;
            
            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({\n`;
                lua += `    Title = "${t.title}",\n`;
                lua += `    Icon = "${t.icon}"\n`;
                lua += `})\n\n`;

                const sections = elements.filter(x => x.tabId === t.id && x.type === 'Section');
                sections.forEach(s => {
                    const sVar = s.title.replace(/\s/g, '');
                    lua += `local ${sVar} = ${tVar}:Section({\n`;
                    lua += `    Title = "${s.title}"\n`;
                    lua += `})\n\n`;
                    elements.filter(x => x.sectionId === s.id).forEach(e => lua += buildEl(sVar, e));
                });

                elements.filter(x => x.tabId === t.id && x.type !== 'Tab' && x.type !== 'Section' && !x.sectionId).forEach(e => {
                    lua += buildEl(tVar, e);
                });
            });
            document.getElementById('source-out').value = lua;
            nav('export');
        }

        function buildEl(parent, e) {
            let res = `${parent}:${e.type}({\n`;
            res += `    Title = "${e.title}",\n`;
            if(e.type === 'Paragraph') {
                res += `    Desc = "${e.desc}"\n})\n\n`;
                return res;
            }
            if(e.type === 'Slider') {
                res += `    Value = {\n        Min = ${e.min},\n        Max = ${e.max},\n        Default = ${e.def}\n    },\n`;
            } else if(e.type === 'Dropdown') {
                res += `    Values = {\n        ${e.options.split(',').map(o=>'"'+o.trim()+'"').join(',\n        ')}\n    },\n`;
            }
            res += `    Callback = function(value)\n        ${e.code.replace(/\n/g, '\n        ')}\n    end\n})\n\n`;
            return res;
        }

        function copySnippet(type) {
            const data = {
                dialog: `local Dialog = Window:Dialog({\n    Title = "Confirm Action",\n    Content = "Are you sure?",\n    Buttons = {\n        {\n            Title = "Yes",\n            Callback = function()\n                print("Confirmed")\n            end\n        },\n        {\n            Title = "No",\n            Callback = function()\n                print("Cancelled")\n            end\n        }\n    }\n})`,
                popup: `local Popup = WindUI:Popup({\n    Title = "Welcome",\n    Content = "Welcome to our application!",\n    Buttons = {\n        {\n            Title = "Get Started",\n            Callback = function()\n                print("Getting started...")\n            end\n        }\n    }\n})`,
                notify: `WindUI:Notify({\n    Title = "Success",\n    Content = "Operation completed successfully",\n    Duration = 3\n})`
            };
            navigator.clipboard.writeText(data[type]);
            alert("Modern Snippet Copied!");
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('source-out').value); alert("V22 Script Copied!"); }
        updatePrev();
    </script>
</body>
</html>

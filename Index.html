<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V25</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff0000; --bg: #010101; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroller { scrollbar-width: none; overflow-y: auto; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; }
        .mac-window { background: #000; border-radius: 40px; border: 1px solid #111; box-shadow: 0 40px 100px rgba(0,0,0,1); position: relative; }
        
        .btn-main { background: linear-gradient(135deg, var(--accent), #770000); padding: 12px 24px; border-radius: 100px; font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,0,0,0.4); }

        .theme-card { height: 120px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; text-transform: uppercase; transition: 0.4s; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .theme-card:hover { transform: translateY(-5px); border-color: white; }

        .editor-node { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 12px; cursor: grab; position: relative; }
        .editor-node.dragging { opacity: 0.5; border: 1px dashed var(--accent); }
        .edit-mode-active .editor-node:hover { border-color: var(--accent); background: rgba(255,0,0,0.05); }

        #icon-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.99); z-index: 10000; padding: 50px; flex-direction: column; }
        
        /* Edit Top Bar Overlay */
        #topbar-editor { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 20000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <div id="topbar-editor">
        <div class="glass p-12 w-[500px] space-y-6">
            <h3 class="text-xl font-black italic uppercase">Edit <span class="text-red-600">Open Button</span></h3>
            <div class="space-y-4">
                <input type="text" id="top-title" value="Open Hub" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="top-color1" value="FF0F7B" placeholder="Hex 1">
                    <input type="text" id="top-color2" value="F89B29" placeholder="Hex 2">
                </div>
                <div class="flex items-center gap-4">
                    <label class="text-xs font-bold uppercase">Mobile Only</label>
                    <input type="checkbox" id="top-mobile">
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="document.getElementById('topbar-editor').style.display='none'" class="btn-main w-full">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="icon-modal">
        <div class="flex justify-between items-center mb-10 max-w-6xl mx-auto w-full">
            <h3 class="text-3xl font-black italic uppercase">Lucide <span class="text-red-600">Assets</span></h3>
            <input type="text" id="icon-search" placeholder="Search icons..." class="w-1/3 bg-white/5 p-4 rounded-full border border-white/10" oninput="renderIcons(this.value)">
            <button onclick="closeIconModal()" class="btn-main">CLOSE</button>
        </div>
        <div class="max-w-6xl mx-auto w-full flex-1 scroller glass p-8">
            <div class="grid grid-cols-10 gap-4" id="icon-container"></div>
        </div>
    </div>

    <aside class="w-80 bg-black border-r border-white/5 flex flex-col p-10">
        <div class="mb-16">
            <h1 class="text-4xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V25</span></h1>
        </div>
        <nav class="space-y-4 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-6 rounded-[25px] bg-white/5 font-bold text-xs uppercase tracking-widest border border-white/10">Architect</button>
            <button onclick="nav('pad')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white">The Pad</button>
            <button onclick="nav('theme')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white">Themes</button>
        </nav>
    </aside>

    <main class="flex-1 p-16 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-end mb-12">
                <h2 class="text-2xl font-bold uppercase italic">Workspace</h2>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('topbar-editor').style.display='flex'" class="btn-main bg-zinc-800 !from-zinc-800 !to-zinc-900">Edit Top Bar</button>
                    <button onclick="toggleEditMode()" id="edit-mode-btn" class="btn-main !from-orange-500 !to-orange-700">Edit Mode: OFF</button>
                    <button onclick="compile();" class="btn-main">Export to Pad</button>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-6">
                    <div class="glass p-8">
                        <input type="text" id="ui-name" oninput="updatePrev()" value="WindUI Hub" class="!text-2xl !font-bold !bg-transparent !border-none !p-0 w-full outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="add('Tab')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Tab</button>
                        <button onclick="add('Section')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Section</button>
                        <button onclick="add('Button')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Button</button>
                        <button onclick="add('Toggle')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Toggle</button>
                        <button onclick="add('Slider')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Slider</button>
                        <button onclick="add('Dropdown')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Drop</button>
                        <button onclick="add('Input')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Input</button>
                        <button onclick="add('Paragraph')" class="p-4 glass text-[10px] font-bold uppercase hover:bg-red-600 transition">Para</button>
                    </div>

                    <div id="node-editor" class="glass p-8 hidden border-red-600/20">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-black text-red-600 uppercase">Configuration</span>
                            <button id="icon-btn" onclick="openIconModal()" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg hidden">ICON</button>
                        </div>
                        <div id="editor-fields" class="space-y-6 max-h-[300px] scroller pr-2"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window h-[600px] flex flex-col">
                        <div class="p-10 border-b border-white/5 flex flex-col items-center">
                            <span id="prev-window-name" class="text-4xl font-black italic uppercase">WindUI Hub</span>
                        </div>
                        <div class="flex-1 flex overflow-hidden">
                            <div class="w-64 border-r border-white/5 p-6 space-y-3 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-10 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-pad" class="tab-content hidden h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black italic uppercase">The <span class="text-red-600">Pad</span></h2>
                <div class="flex gap-4">
                    <button onclick="copySnippet('dialog')" class="bg-zinc-900 px-6 py-4 rounded-2xl text-[10px] font-bold">+ Dialog</button>
                    <button onclick="copySnippet('notify')" class="bg-zinc-900 px-6 py-4 rounded-2xl text-[10px] font-bold">+ Notify</button>
                    <button onclick="navigator.clipboard.writeText(document.getElementById('script-pad').value); alert('Copied!');" class="btn-main">Copy Final Script</button>
                </div>
            </div>
            <textarea id="script-pad" class="flex-1 glass p-12 font-mono text-sm text-red-500 outline-none resize-none scroller" spellcheck="false"></textarea>
        </div>

        <div id="t-theme" class="tab-content hidden">
            <h2 class="text-3xl font-black italic mb-10">THEME <span class="text-red-600">UNIVERSE</span></h2>
            <div class="grid grid-cols-3 gap-6" id="theme-grid"></div>
        </div>

    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let activeSection = null;
        let editingId = null;
        let isEditMode = false;
        let scriptTheme = "Dark";
        const iconNames = Object.keys(lucide.icons);

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            document.getElementById('edit-mode-btn').innerText = `Edit Mode: ${isEditMode ? 'ON' : 'OFF'}`;
            document.body.classList.toggle('edit-mode-active', isEditMode);
            updatePrev();
        }

        function renderThemes() {
            const themes = [
                { name: 'Midnight', bg: 'linear-gradient(135deg, #000, #111)', accent: '#ff0000' },
                { name: 'Crimson Frost', bg: 'linear-gradient(135deg, #0f0000, #220000)', accent: '#ff4444' },
                { name: 'Oceanic', bg: 'linear-gradient(135deg, #00050a, #001a2a)', accent: '#00d2ff' },
                { name: 'Toxic', bg: 'linear-gradient(135deg, #020a00, #0a2200)', accent: '#39ff14' },
                { name: 'Vaporwave', bg: 'linear-gradient(135deg, #05000a, #1a002a)', accent: '#ff00ff' },
                { name: 'Gold Standard', bg: 'linear-gradient(135deg, #0a0800, #221a00)', accent: '#ffcc00' }
            ];
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = themes.map(t => `
                <div class="theme-card" style="background:${t.bg}; color:#fff" onclick="setTheme('${t.name}', '${t.bg}', '${t.accent}')">
                    ${t.name}
                </div>
            `).join('');
        }

        function setTheme(n, b, a) { scriptTheme = n; document.getElementById('prev-window').style.background = b; document.documentElement.style.setProperty('--accent', a); }

        function openIconModal() { document.getElementById('icon-modal').style.display='flex'; renderIcons(""); }
        function closeIconModal() { document.getElementById('icon-modal').style.display='none'; }
        function renderIcons(q) {
            const container = document.getElementById('icon-container'); container.innerHTML = '';
            iconNames.filter(n => n.includes(q.toLowerCase())).slice(0, 300).forEach(name => {
                const div = document.createElement('div'); div.className = 'p-4 glass text-center cursor-pointer hover:bg-red-600 transition';
                div.innerHTML = `<i data-lucide="${name}" style="margin:auto; width:18px"></i>`;
                div.onclick = () => { elements.find(x => x.id === editingId).icon = name; updatePrev(); closeIconModal(); };
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function add(type) {
            const id = Date.now();
            const el = { id, type, title: `New ${type}`, desc: "Desc text", code: 'print("Executed")', tabId: activeTab, sectionId: (type === 'Section' ? null : activeSection), min: 0, max: 100, def: 50, options: "A, B, C", icon: "box" };
            if(type === 'Tab') { el.tabId = id; activeTab = id; activeSection = null; }
            if(type === 'Section') { el.tabId = activeTab; activeSection = id; }
            elements.push(el);
            updatePrev();
        }

        function moveElement(id, direction) {
            const index = elements.findIndex(e => e.id === id);
            if (index < 0) return;
            const newIndex = index + direction;
            if (newIndex >= 0 && newIndex < elements.length) {
                [elements[index], elements[newIndex]] = [elements[newIndex], elements[index]];
                updatePrev();
            }
        }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.className = `p-4 rounded-2xl text-[10px] font-black uppercase cursor-pointer flex items-center gap-3 ${activeTab === t.id ? 'bg-white text-black' : 'text-zinc-500 hover:text-white'}`;
                d.innerHTML = `<i data-lucide="${t.icon}" style="width:14px"></i><span>${t.title}</span>`;
                if(isEditMode) d.innerHTML += `<div class="ml-auto flex gap-1"><i onclick="moveElement(${t.id}, -1)" class="fas fa-chevron-up"></i><i onclick="moveElement(${t.id}, 1)" class="fas fa-chevron-down"></i></div>`;
                d.onclick = (e) => { if(e.target.tagName !== 'I') { activeTab = t.id; activeSection = null; updatePrev(); openEditor(t.id); } };
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.className = `editor-node ${activeSection === e.id ? 'active' : ''}`;
                    d.innerHTML = `<p class="text-[7px] text-red-600 font-black uppercase">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4>`;
                    if(isEditMode) d.innerHTML += `<div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-4 text-zinc-600"><i onclick="moveElement(${e.id}, -1)" class="fas fa-arrow-up cursor-pointer hover:text-white"></i><i onclick="moveElement(${e.id}, 1)" class="fas fa-arrow-down cursor-pointer hover:text-white"></i></div>`;
                    if(e.sectionId) d.style.marginLeft = "30px";
                    d.onclick = (ev) => { if(ev.target.tagName !== 'I') { if(e.type === 'Section') activeSection = e.id; openEditor(e.id); updatePrev(); } };
                    cList.appendChild(d);
                });
            }
            lucide.createIcons();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const fields = document.getElementById('editor-fields');
            document.getElementById('node-editor').classList.remove('hidden');
            document.getElementById('icon-btn').style.display = el.type === 'Tab' ? 'block' : 'none';
            fields.innerHTML = `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Title</label><input type="text" value="${el.title}" class="w-full bg-white/5 p-4 rounded-xl" oninput="elements.find(x=>x.id===${id}).title=this.value; updatePrev()"></div>`;
            if(el.type !== 'Tab' && el.type !== 'Section') fields.innerHTML += `<div><label class="text-[8px] font-black text-zinc-500 uppercase">Logic</label><textarea class="w-full h-32 bg-white/5 p-4 rounded-xl font-mono text-xs" oninput="elements.find(x=>x.id===${id}).code=this.value">${el.code}</textarea></div>`;
        }

        function compile() {
            let lua = `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n    Title = "${document.getElementById('ui-name').value}",\n    Author = ".ftgs",\n    Theme = "${scriptTheme}",\n    Transparent = true\n})\n\n`;
            
            lua += `Window:EditOpenButton({\n`;
            lua += `    Title = "${document.getElementById('top-title').value}",\n`;
            lua += `    Icon = "monitor",\n`;
            lua += `    CornerRadius = UDim.new(0, 16),\n`;
            lua += `    StrokeThickness = 2,\n`;
            lua += `    Color = ColorSequence.new(\n        Color3.fromHex("${document.getElementById('top-color1').value}"),\n        Color3.fromHex("${document.getElementById('top-color2').value}")\n    ),\n`;
            lua += `    OnlyMobile = ${document.getElementById('top-mobile').checked},\n`;
            lua += `    Enabled = true,\n`;
            lua += `    Draggable = true\n`;
            lua += `})\n\n`;

            elements.filter(e => e.type === 'Tab').forEach(t => {
                const tV = t.title.replace(/\s/g, '');
                lua += `local ${tV} = Window:Tab({\n    Title = "${t.title}",\n    Icon = "${t.icon}"\n})\n\n`;
                
                elements.filter(s => s.tabId === t.id && s.type === 'Section').forEach(sec => {
                    const sV = sec.title.replace(/\s/g, '');
                    lua += `local ${sV} = ${tV}:Section({\n    Title = "${sec.title}"\n})\n\n`;
                    elements.filter(item => item.sectionId === sec.id).forEach(item => lua += buildFullLua(sV, item));
                });

                elements.filter(item => item.tabId === t.id && item.type !== 'Tab' && item.type !== 'Section' && !item.sectionId).forEach(item => {
                    lua += buildFullLua(tV, item);
                });
            });

            document.getElementById('script-pad').value = lua;
            nav('pad');
        }

        function buildFullLua(p, e) {
            let res = `${p}:${e.type}({\n    Title = "${e.title}",\n`;
            if(e.type === 'Slider') {
                res += `    Value = {\n        Min = ${e.min},\n        Max = ${e.max},\n        Default = ${e.def}\n    },\n`;
            } else if(e.type === 'Dropdown') {
                res += `    Values = {\n        ${e.options.split(',').map(o=>'"'+o.trim()+'"').join(',\n        ')}\n    },\n`;
            }
            res += `    Callback = function(value)\n        ${e.code.replace(/\n/g, '\n        ')}\n    end\n})\n\n`;
            return res;
        }

        function copySnippet(type) {
            const snips = {
                dialog: `local Dialog = Window:Dialog({\n    Title = "Confirm",\n    Content = "Are you sure?",\n    Buttons = {\n        { Title = "Yes", Callback = function() print("Yes") end },\n        { Title = "No", Callback = function() print("No") end }\n    }\n})`,
                notify: `WindUI:Notify({\n    Title = "Success",\n    Content = "Action processed",\n    Duration = 3\n})`
            };
            document.getElementById('script-pad').value += "\n" + snips[type] + "\n";
        }

        updatePrev();
    </script>
</body>
        </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V14</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --prev-accent: #ff0000; --prev-bg: #080808; }
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        /* --- THE BLACKHOLE ENGINE --- */
        @keyframes blackholeSuck {
            0% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0) rotate(1080deg); opacity: 0; filter: blur(20px); }
        }
        .deleting { animation: blackholeSuck 1.2s forwards cubic-bezier(0.5, -0.5, 0.1, 1.5); pointer-events: none; }
        .blackhole { 
            position: fixed; width: 100px; height: 100px; background: #000; border-radius: 50%; border: 4px solid var(--prev-accent);
            z-index: 9999; pointer-events: none; transform: translate(-50%, -50%); box-shadow: 0 0 40px var(--prev-accent);
        }

        /* --- UI COMPONENTS --- */
        .mac-window { background: var(--prev-bg); border-radius: 30px; border: 1px solid #1a1a1a; transition: background 0.5s ease; height: 650px; }
        .tab-prev { padding: 14px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; color: #444; }
        .tab-prev.active { background: rgba(255,255,255,0.05); color: #fff; border-left: 4px solid var(--prev-accent); }
        
        .node-card { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 12px; }
        .node-card:hover { border-color: var(--prev-accent); }

        /* --- INPUTS & SIDEBAR --- */
        .editor-container { max-height: 400px; overflow-y: auto; scrollbar-width: none; }
        input, textarea { background: #050505 !important; border: 1px solid #151515 !important; color: #fff !important; border-radius: 12px !important; font-size: 12px !important; padding: 12px !important; width: 100%; }
        input:focus { border-color: var(--prev-accent) !important; }

        .export-btn { background: var(--prev-accent); padding: 15px 40px; border-radius: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
        .scroller { overflow-y: auto; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        
        /* THEME PREVIEW DOTS */
        .theme-dot { height: 80px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 10px; border: 2px solid transparent; }
        .theme-dot:hover { border-color: #fff; }

        /* QUICK EDIT OVERLAY */
        #rename-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; background: #0a0a0a; border: 1px solid #333; padding: 30px; border-radius: 25px; display: none; width: 300px; }
    </style>
</head>
<body class="flex">

    <div id="rename-popup">
        <p class="text-[10px] font-black uppercase text-zinc-500 mb-4">Rename Element</p>
        <input type="text" id="rename-input" class="mb-4">
        <button onclick="closeRename()" class="w-full bg-red-600 p-3 rounded-xl font-black text-[10px] uppercase">Save Changes</button>
    </div>

    <aside class="w-80 bg-black border-r border-zinc-900 flex flex-col p-8 z-50">
        <div class="mb-12">
            <h1 class="text-2xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V14</span></h1>
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-4 rounded-2xl bg-zinc-900 text-white font-bold text-xs">DESIGNER</button>
            <button onclick="nav('sec')" class="w-full text-left p-4 rounded-2xl text-zinc-500 font-bold text-xs hover:text-white transition">PROTECTION</button>
            <button onclick="nav('theme')" class="w-full text-left p-4 rounded-2xl text-zinc-500 font-bold text-xs hover:text-white transition">THEMES</button>
        </nav>
    </aside>

    <main class="flex-1 p-10 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xs font-black text-zinc-600 tracking-widest uppercase italic">Architect Edition</h2>
                <button onclick="compile()" class="export-btn">COMPILE SCRIPT</button>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-4">
                    <div class="bg-zinc-950 p-6 rounded-[30px] border border-zinc-900">
                        <input type="text" id="ui-name" oninput="updatePrev()" value="Darkz Hub" class="mb-3 !text-xl !font-black">
                        <input type="text" id="ui-author" value="by .ftgs">
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="add('Tab')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Tab</button>
                        <button onclick="add('Button')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Button</button>
                        <button onclick="add('Toggle')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Toggle</button>
                        <button onclick="add('Slider')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Slider</button>
                        <button onclick="add('Dropdown')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Dropdown</button>
                    </div>

                    <div id="node-editor" class="bg-zinc-900/50 p-6 rounded-[30px] border border-zinc-800 hidden">
                        <h3 class="text-[10px] font-black text-red-600 uppercase mb-4">Live Configuration</h3>
                        <div id="editor-fields" class="editor-container space-y-4 pr-2"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div class="mac-window flex flex-col">
                        <div class="p-6 border-b border-zinc-900 flex justify-between items-center">
                            <div class="flex gap-2"><div class="w-3 h-3 rounded-full bg-red-500"></div><div class="w-3 h-3 rounded-full bg-yellow-500"></div><div class="w-3 h-3 rounded-full bg-green-500"></div></div>
                            <span id="prev-window-name" class="text-3xl font-black italic uppercase tracking-tighter">Darkz Hub</span>
                            <div class="w-10"></div>
                        </div>
                        <div class="flex flex-1 overflow-hidden">
                            <div class="w-56 border-r border-zinc-900 p-5 space-y-2 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-10 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-theme" class="tab-content hidden grid grid-cols-4 gap-4"></div>

        <div id="t-export" class="tab-content hidden h-full">
            <div class="bg-zinc-950 rounded-3xl border border-zinc-900 h-full flex flex-col">
                <div class="p-6 flex justify-between items-center border-b border-zinc-900">
                    <span class="text-xs font-black text-red-600 uppercase">Script Compiled Successfully</span>
                    <button onclick="copyFinal()" class="bg-white text-black px-8 py-3 rounded-full text-xs font-black">COPY CLIPBOARD</button>
                </div>
                <textarea id="source-out" readonly class="flex-1 p-10 bg-black font-mono text-xs text-red-500 scroller outline-none"></textarea>
            </div>
        </div>
    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let editingId = null;

        const themeList = [
            { n: "Dark", c: "#ff0000", b: "#080808" },
            { n: "Aqua", c: "#00ffff", b: "#001a1a" },
            { n: "Lime", c: "#00ff00", b: "#051505" },
            { n: "Cotton Candy", c: "#f9a8d4", b: "#1a001a" },
            { n: "Gold", c: "#ffcc00", b: "#1a1500" },
            { n: "Midnight", c: "#5555ff", b: "#00001a" }
        ];

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function renderThemes() {
            const grid = document.getElementById('t-theme'); grid.innerHTML = '';
            themeList.forEach(t => {
                const dot = document.createElement('div');
                dot.className = "theme-dot";
                dot.style.background = t.b;
                dot.style.color = t.c;
                dot.innerHTML = t.n;
                dot.onclick = () => {
                    document.documentElement.style.setProperty('--prev-accent', t.c);
                    document.documentElement.style.setProperty('--prev-bg', t.b);
                    alert("UI Theme Preview Updated to " + t.n);
                };
                grid.appendChild(dot);
            });
        }

        function add(type) {
            const id = Date.now();
            const el = { 
                id, type, title: `New ${type}`, 
                desc: "Description here", code: 'print("Executed")', 
                tabId: activeTab, min: 0, max: 100, def: 50, options: "Option 1, Option 2" 
            };
            if(type === 'Tab') { el.tabId = id; activeTab = id; }
            elements.push(el);
            updatePrev();
        }

        function openRename(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            document.getElementById('rename-input').value = el.title;
            document.getElementById('rename-popup').style.display = 'block';
        }

        function closeRename() {
            const val = document.getElementById('rename-input').value;
            const el = elements.find(x => x.id === editingId);
            if(el) el.title = val;
            document.getElementById('rename-popup').style.display = 'none';
            updatePrev();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const editor = document.getElementById('node-editor');
            const fields = document.getElementById('editor-fields');
            editor.classList.remove('hidden');
            fields.innerHTML = `
                <input type="text" value="${el.title}" oninput="updateNode(${id}, 'title', this.value)" placeholder="Title">
                <textarea oninput="updateNode(${id}, 'desc', this.value)" placeholder="Description">${el.desc}</textarea>
                <textarea class="h-32" oninput="updateNode(${id}, 'code', this.value)" placeholder="Lua Code">${el.code}</textarea>
            `;
            if(el.type === 'Slider') {
                fields.innerHTML += `<div class="grid grid-cols-3 gap-2">
                    <input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)" placeholder="Min">
                    <input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)" placeholder="Max">
                    <input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)" placeholder="Def">
                </div>`;
            }
            if(el.type === 'Dropdown') {
                fields.innerHTML += `<textarea oninput="updateNode(${id}, 'options', this.value)" placeholder="Options (Split by comma)">${el.options}</textarea>`;
            }
        }

        function updateNode(id, k, v) { 
            const el = elements.find(x => x.id === id); if(el) el[k] = v; updatePrev(); 
        }

        function deleteNode(id) {
            const node = document.getElementById(`prev-node-${id}`) || document.getElementById(`prev-tab-${id}`);
            const rect = node.getBoundingClientRect();
            const hole = document.createElement('div');
            hole.className = 'blackhole';
            hole.style.left = `${rect.left + rect.width/2}px`;
            hole.style.top = `${rect.top + rect.height/2}px`;
            document.body.appendChild(hole);
            node.classList.add('deleting');
            setTimeout(() => {
                elements = elements.filter(x => x.id !== id);
                if(activeTab === id) activeTab = null;
                updatePrev(); hole.remove();
                document.getElementById('node-editor').classList.add('hidden');
            }, 1200);
        }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.id = `prev-tab-${t.id}`;
                d.className = `tab-prev ${activeTab === t.id ? 'active' : ''}`;
                d.innerHTML = `<div class="flex justify-between"><span>${t.title}</span><i onclick="deleteNode(${t.id})" class="fas fa-times opacity-20"></i></div>`;
                d.onclick = (e) => { if(e.target.tagName !== 'I') { activeTab = t.id; updatePrev(); } };
                d.ondblclick = () => openRename(t.id);
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.id = `prev-node-${e.id}`;
                    d.className = "node-card flex justify-between items-center cursor-pointer";
                    d.onclick = (evt) => { if(evt.target.tagName !== 'I') openEditor(e.id); };
                    d.innerHTML = `<div><p class="text-[8px] font-black text-red-600 uppercase mb-1">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4></div><i onclick="deleteNode(${e.id})" class="fas fa-trash text-zinc-800 hover:text-red-600"></i>`;
                    cList.appendChild(d);
                });
            }
        }

        function compile() {
            const name = document.getElementById('ui-name').value;
            const auth = document.getElementById('ui-author').value;
            let lua = `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n    Title = "${name}", Author = "${auth}", Theme = "Dark", Transparent = true\n})\n\n`;
            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({ Title = "${t.title}", Icon = "bird" })\n`;
                elements.filter(x => x.tabId === t.id && x.type !== 'Tab').forEach(e => {
                    if(e.type === 'Slider') lua += `${tVar}:Slider({ Title = "${e.title}", Desc = "${e.desc}", Min = ${e.min}, Max = ${e.max}, Default = ${e.def}, Callback = function(v) ${e.code} end })\n`;
                    else if(e.type === 'Dropdown') lua += `${tVar}:Dropdown({ Title = "${e.title}", Options = {${e.options.split(',').map(x=>'"'+x.trim()+'"').join(',')}}, Callback = function(v) ${e.code} end })\n`;
                    else lua += `${tVar}:${e.type}({ Title = "${e.title}", Desc = "${e.desc}", Callback = function(v) ${e.code} end })\n`;
                });
                lua += `\n`;
            });
            document.getElementById('source-out').value = lua; nav('export');
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('source-out').value); alert("Copied!"); }
        updatePrev();
    </script>
</body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --prev-accent: #ff0000; --prev-bg: #080808; }
        body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        /* --- THE BLACKHOLE ENGINE --- */
        @keyframes blackholeSuck {
            0% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0) rotate(1080deg); opacity: 0; filter: blur(20px); }
        }
        .deleting { animation: blackholeSuck 1.2s forwards cubic-bezier(0.5, -0.5, 0.1, 1.5); pointer-events: none; }
        .blackhole { 
            position: fixed; width: 100px; height: 100px; background: #000; border-radius: 50%; border: 4px solid var(--prev-accent);
            z-index: 9999; pointer-events: none; transform: translate(-50%, -50%); box-shadow: 0 0 40px var(--prev-accent);
        }

        /* --- UI COMPONENTS --- */
        .mac-window { background: var(--prev-bg); border-radius: 30px; border: 1px solid #1a1a1a; transition: all 0.5s ease; height: 650px; position: relative; }
        .tab-prev { padding: 14px; border-radius: 12px; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; color: #444; }
        .tab-prev.active { background: rgba(255,255,255,0.05); color: #fff; border-left: 4px solid var(--prev-accent); }
        
        .node-card { background: #0d0d0d; border: 1px solid #1a1a1a; padding: 20px; border-radius: 20px; margin-bottom: 12px; }
        .node-card:hover { border-color: var(--prev-accent); }

        /* --- EDITOR & INPUTS --- */
        .editor-scroll { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .editor-scroll::-webkit-scrollbar { width: 4px; }
        .editor-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        input, textarea, select { background: #050505 !important; border: 1px solid #151515 !important; color: #fff !important; border-radius: 12px !important; font-size: 12px !important; padding: 12px !important; width: 100%; }
        input:focus { border-color: var(--prev-accent) !important; }

        .export-btn { background: var(--prev-accent); padding: 15px 40px; border-radius: 15px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .scroller { overflow-y: auto; scrollbar-width: none; }
        .scroller::-webkit-scrollbar { display: none; }
        
        .theme-card { height: 100px; border-radius: 20px; cursor: pointer; border: 2px solid #1a1a1a; transition: 0.3s; position: relative; overflow: hidden; }
        .theme-card.active { border-color: #fff; }

        /* TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; transition: .4s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--prev-accent); }
        input:checked + .slider-round:before { transform: translateX(24px); }
    </style>
</head>
<body class="flex">

    <aside class="w-80 bg-black border-r border-zinc-900 flex flex-col p-8 z-50">
        <div class="mb-12">
            <h1 class="text-2xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V15</span></h1>
        </div>
        <nav class="space-y-3 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-4 rounded-2xl bg-zinc-900 text-white font-bold text-xs uppercase">Designer</button>
            <button onclick="nav('sec')" class="w-full text-left p-4 rounded-2xl text-zinc-500 font-bold text-xs uppercase hover:text-white">Protection</button>
            <button onclick="nav('theme')" class="w-full text-left p-4 rounded-2xl text-zinc-500 font-bold text-xs uppercase hover:text-white">Themes</button>
        </nav>
        <button onclick="compile()" class="export-btn w-full">Export Lua</button>
    </aside>

    <main class="flex-1 p-10 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-4">
                    <div class="bg-zinc-950 p-6 rounded-[30px] border border-zinc-900">
                        <label class="text-[10px] font-black text-zinc-500 uppercase mb-2 block">Identity</label>
                        <input type="text" id="ui-name" oninput="updatePrev()" value="Darkz Hub" class="mb-2 !text-xl !font-black">
                        <input type="text" id="ui-author" oninput="updatePrev()" value="by .ftgs" class="text-zinc-500">
                        
                        <div class="mt-6 flex justify-between items-center bg-black p-4 rounded-2xl border border-zinc-900">
                            <span class="text-xs font-bold">Transparent UI</span>
                            <label class="switch"><input type="checkbox" id="ui-trans" checked onchange="updatePrev()"><span class="slider-round"></span></label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="add('Tab')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Tab</button>
                        <button onclick="add('Button')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Button</button>
                        <button onclick="add('Toggle')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Toggle</button>
                        <button onclick="add('Slider')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Slider</button>
                        <button onclick="add('Dropdown')" class="p-4 bg-zinc-900 rounded-2xl text-[10px] font-black uppercase">+ Dropdown</button>
                    </div>

                    <div id="node-editor" class="bg-zinc-950 p-6 rounded-[30px] border border-zinc-800 hidden">
                        <h3 class="text-[10px] font-black text-red-600 uppercase mb-4">Properties</h3>
                        <div id="editor-fields" class="editor-scroll space-y-4"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window flex flex-col">
                        <div class="p-8 border-b border-zinc-900 flex flex-col items-center">
                            <span id="prev-window-name" class="text-4xl font-black italic uppercase tracking-tighter">Darkz Hub</span>
                            <span id="prev-author-name" class="text-xs font-bold text-zinc-500 mt-1 uppercase tracking-widest">by .ftgs</span>
                        </div>
                        <div class="flex flex-1 overflow-hidden">
                            <div class="w-56 border-r border-zinc-900 p-5 space-y-2 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-10 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-theme" class="tab-content hidden grid grid-cols-4 gap-6"></div>

        <div id="t-sec" class="tab-content hidden flex justify-center pt-10">
            <div class="bg-zinc-950 p-10 rounded-[40px] border border-zinc-900 w-full max-w-lg">
                <h3 class="text-xl font-black uppercase text-center mb-10">Security Guard</h3>
                <div class="flex justify-between items-center bg-black p-6 rounded-3xl border border-zinc-900 mb-4">
                    <span class="font-bold text-xs uppercase">Enable Key System</span>
                    <label class="switch"><input type="checkbox" id="key-on"><span class="slider-round"></span></label>
                </div>
                <input type="text" id="key-val" value="MySecretKey" class="mb-4" placeholder="Correct Key">
                <input type="text" id="key-url" value="https://linkvertise.com/..." placeholder="Key Link (e.g. Discord)">
            </div>
        </div>

        <div id="t-export" class="tab-content hidden h-full">
            <div class="bg-zinc-950 rounded-3xl border border-zinc-900 h-full flex flex-col">
                <div class="p-6 flex justify-between items-center">
                    <span class="text-xs font-black text-red-600 uppercase italic">Compiled WindUI Source</span>
                    <button onclick="copyFinal()" class="bg-white text-black px-8 py-3 rounded-full text-xs font-black">COPY CLIPBOARD</button>
                </div>
                <textarea id="source-out" readonly class="flex-1 p-10 bg-black font-mono text-sm text-blue-400 outline-none scroller"></textarea>
            </div>
        </div>
    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let scriptTheme = "Dark";
        let editingId = null;

        const themes = [
            { n: "Dark", c: "#ff0000", b: "#080808" },
            { n: "Crimson", c: "#800000", b: "#0a0000" },
            { n: "Aqua", c: "#00ffff", b: "#001a1a" },
            { n: "Midnight", c: "#5555ff", b: "#00001a" },
            { n: "Rose", c: "#fb7185", b: "#1a0005" },
            { n: "Emerald", c: "#10b981", b: "#001a0a" }
        ];

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function renderThemes() {
            const grid = document.getElementById('t-theme'); grid.innerHTML = '';
            themes.forEach(t => {
                const card = document.createElement('div');
                card.className = `theme-card ${scriptTheme === t.n ? 'active' : ''}`;
                card.style.background = t.b;
                card.innerHTML = `<div class="absolute inset-0 flex items-center justify-center font-black uppercase text-[10px]" style="color:${t.c}">${t.n}</div>`;
                card.onclick = () => {
                    scriptTheme = t.n;
                    document.documentElement.style.setProperty('--prev-accent', t.c);
                    document.documentElement.style.setProperty('--prev-bg', t.b);
                    renderThemes();
                };
                grid.appendChild(card);
            });
        }

        function add(type) {
            const id = Date.now();
            const el = { 
                id, type, title: `New ${type}`, 
                desc: "Description text", code: 'print("Executed")', 
                tabId: activeTab, min: 0, max: 100, def: 50, options: "Option 1, Option 2" 
            };
            if(type === 'Tab') { el.tabId = id; activeTab = id; }
            elements.push(el);
            updatePrev();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const editor = document.getElementById('node-editor');
            const fields = document.getElementById('editor-fields');
            editor.classList.remove('hidden');
            fields.innerHTML = `
                <div><label class="text-[8px] uppercase font-bold text-zinc-500 mb-1 block">Title</label><input type="text" value="${el.title}" oninput="updateNode(${id}, 'title', this.value)"></div>
                <div><label class="text-[8px] uppercase font-bold text-zinc-500 mb-1 block">Description</label><textarea oninput="updateNode(${id}, 'desc', this.value)">${el.desc}</textarea></div>
                <div><label class="text-[8px] uppercase font-bold text-zinc-500 mb-1 block">Callback Code</label><textarea class="h-32 font-mono text-[10px]" oninput="updateNode(${id}, 'code', this.value)">${el.code}</textarea></div>
            `;
            if(el.type === 'Slider') {
                fields.innerHTML += `
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="text-[8px] uppercase font-bold text-zinc-500">Min</label><input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)"></div>
                        <div><label class="text-[8px] uppercase font-bold text-zinc-500">Max</label><input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)"></div>
                        <div><label class="text-[8px] uppercase font-bold text-zinc-500">Def</label><input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)"></div>
                    </div>`;
            }
            if(el.type === 'Dropdown') {
                fields.innerHTML += `<div><label class="text-[8px] uppercase font-bold text-zinc-500">Options (Comma Sep)</label><textarea oninput="updateNode(${id}, 'options', this.value)">${el.options}</textarea></div>`;
            }
        }

        function updateNode(id, k, v) { 
            const el = elements.find(x => x.id === id); if(el) el[k] = v; updatePrev(); 
        }

        function deleteNode(id) {
            const node = document.getElementById(`node-${id}`);
            const rect = node.getBoundingClientRect();
            const hole = document.createElement('div');
            hole.className = 'blackhole';
            hole.style.left = `${rect.left + rect.width/2}px`; hole.style.top = `${rect.top + rect.height/2}px`;
            document.body.appendChild(hole);
            node.classList.add('deleting');
            setTimeout(() => {
                elements = elements.filter(x => x.id !== id);
                if(activeTab === id) activeTab = null;
                updatePrev(); hole.remove();
                document.getElementById('node-editor').classList.add('hidden');
            }, 1200);
        }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            document.getElementById('prev-author-name').innerText = document.getElementById('ui-author').value;
            document.getElementById('prev-window').style.opacity = document.getElementById('ui-trans').checked ? "0.8" : "1";
            
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.id = `node-${t.id}`;
                d.className = `tab-prev ${activeTab === t.id ? 'active' : ''}`;
                d.innerHTML = `<div class="flex justify-between"><span>${t.title}</span><i onclick="deleteNode(${t.id})" class="fas fa-times opacity-20"></i></div>`;
                d.onclick = (e) => { if(e.target.tagName !== 'I') { activeTab = t.id; updatePrev(); } };
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.id = `node-${e.id}`;
                    d.className = "node-card flex justify-between items-center cursor-pointer";
                    d.onclick = (evt) => { if(evt.target.tagName !== 'I') openEditor(e.id); };
                    d.innerHTML = `<div><p class="text-[8px] font-black text-red-600 uppercase">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4></div><i onclick="deleteNode(${e.id})" class="fas fa-trash text-zinc-800 hover:text-red-500"></i>`;
                    cList.appendChild(d);
                });
            }
        }

        function compile() {
            const name = document.getElementById('ui-name').value;
            const auth = document.getElementById('ui-author').value;
            const trans = document.getElementById('ui-trans').checked;
            const keyOn = document.getElementById('key-on').checked;

            let lua = `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n`;
            lua += `    Title = "${name}",\n`;
            lua += `    Author = "${auth}",\n`;
            lua += `    Theme = "${scriptTheme}",\n`;
            lua += `    Transparent = ${trans}\n`;
            lua += `})\n\n`;

            if(keyOn) {
                lua += `Window:KeySystem({\n`;
                lua += `    KeyValidator = function(key)\n        return key == "${document.getElementById('key-val').value}"\n    end,\n`;
                lua += `    URL = "${document.getElementById('key-url').value}",\n`;
                lua += `    SaveKey = true\n`;
                lua += `})\n\n`;
            }

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({\n    Title = "${t.title}",\n    Icon = "bird"\n})\n\n`;
                
                elements.filter(x => x.tabId === t.id && x.type !== 'Tab').forEach(e => {
                    lua += `${tVar}:${e.type}({\n`;
                    lua += `    Title = "${e.title}",\n`;
                    lua += `    Desc = "${e.desc}",\n`;
                    
                    if(e.type === 'Slider') {
                        lua += `    Min = ${e.min},\n    Max = ${e.max},\n    Default = ${e.def},\n`;
                    } else if(e.type === 'Dropdown') {
                        lua += `    Options = {${e.options.split(',').map(o => '"'+o.trim()+'"').join(', ')}},\n`;
                    }
                    
                    lua += `    Callback = function(value)\n        ${e.code.split('\n').join('\n        ')}\n    end\n})\n\n`;
                });
            });

            document.getElementById('source-out').value = lua;
            nav('export');
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('source-out').value); alert("Script Copied!"); }
        updatePrev();
    </script>
</body>
    </html>

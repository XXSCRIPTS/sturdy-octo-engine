<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff0000; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        .scroller::-webkit-scrollbar { width: 6px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroller { scrollbar-width: thin; overflow-y: auto; }

        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.05); border-radius: 35px; }
        .mac-window { background: #000; border-radius: 45px; border: 1px solid #111; box-shadow: 0 50px 100px rgba(0,0,0,1); }
        
        .export-header-btn {
            background: linear-gradient(135deg, var(--accent), #990000);
            padding: 14px 35px; border-radius: 100px; font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; cursor: pointer; border: none;
        }

        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.07) !important; color: #fff !important; border-radius: 18px !important; padding: 18px !important; }
        input:focus { border-color: var(--accent) !important; }

        /* ICON MODAL */
        #icon-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 20000; padding: 50px; flex-direction: column; }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 15px; padding: 20px; }
        .icon-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.2s; }
        .icon-item:hover { background: var(--accent); border-color: white; transform: scale(1.1); }
        .icon-item i { font-size: 24px; }
        .icon-item p { font-size: 8px; margin-top: 8px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

        .theme-pill { padding: 16px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; text-align: center; border: 2px solid transparent; }
    </style>
</head>
<body class="flex">

    <div id="icon-modal">
        <div class="flex justify-between items-center mb-10 max-w-6xl mx-auto w-full">
            <div>
                <h3 class="text-3xl font-black italic">SELECT <span class="text-red-600">ICON</span></h3>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-2">Browsing 1,600+ Lucide Icons</p>
            </div>
            <input type="text" id="icon-search" placeholder="Search icons (e.g. 'home', 'user', 'settings')..." class="w-1/2" oninput="filterIcons()">
            <button onclick="closeIconModal()" class="bg-zinc-900 px-8 py-4 rounded-full font-black text-xs">CLOSE</button>
        </div>
        <div class="max-w-6xl mx-auto w-full flex-1 scroller glass mb-10">
            <div class="icon-grid" id="icon-container"></div>
        </div>
    </div>

    <aside class="w-80 bg-black/60 border-r border-white/5 flex flex-col p-10 z-50">
        <div class="mb-16">
            <h1 class="text-3xl font-black italic tracking-tighter">DARKZ<span class="text-red-600">V20</span></h1>
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-2">Production Architect</p>
        </div>
        <nav class="space-y-4 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-6 rounded-[25px] bg-white/5 text-white font-bold text-xs uppercase tracking-widest border border-white/10">Architect</button>
            <button onclick="nav('sec')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Protection</button>
            <button onclick="nav('theme')" class="w-full text-left p-6 rounded-[25px] text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Themes</button>
        </nav>
    </aside>

    <main class="flex-1 p-16 scroller">
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-xs font-black text-zinc-700 uppercase tracking-[0.6em] mb-2">Designer Core</h2>
                    <p class="text-2xl font-bold">New WindUI Script</p>
                </div>
                <button onclick="compile()" class="export-header-btn">Compile Full Script</button>
            </div>

            <div class="grid grid-cols-12 gap-12">
                <div class="col-span-4 space-y-8">
                    <div class="glass p-10">
                        <input type="text" id="ui-name" oninput="updatePrev()" value="Quantum Hub" class="!text-3xl !font-bold !bg-transparent !border-none !p-0 mb-3 w-full">
                        <input type="text" id="ui-author" oninput="updatePrev()" value="by .ftgs" class="!text-xs !text-zinc-600 !bg-transparent !border-none !p-0 w-full">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="add('Tab')" class="p-6 glass text-[10px] font-black uppercase hover:bg-red-600">+ Tab</button>
                        <button onclick="add('Button')" class="p-6 glass text-[10px] font-black uppercase hover:bg-red-600">+ Button</button>
                        <button onclick="add('Slider')" class="p-6 glass text-[10px] font-black uppercase hover:bg-red-600">+ Slider</button>
                        <button onclick="add('Dropdown')" class="p-6 glass text-[10px] font-black uppercase hover:bg-red-600">+ Drop</button>
                    </div>

                    <div id="node-editor" class="glass p-10 hidden border-red-600/30">
                        <div class="flex justify-between items-center mb-8">
                            <p class="text-[9px] font-black text-red-600 uppercase tracking-widest">Configuration</p>
                            <button id="icon-trigger" onclick="openIconModal()" class="hidden bg-white text-black text-[10px] font-black px-4 py-2 rounded-lg">ICON</button>
                        </div>
                        <div id="editor-fields" class="space-y-8 max-h-[450px] scroller pr-4"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window flex flex-col h-[700px]">
                        <div class="p-16 border-b border-white/5 flex flex-col items-center">
                            <span id="prev-window-name" class="text-6xl font-black uppercase italic tracking-tighter">Quantum Hub</span>
                            <span id="prev-author-name" class="text-[10px] font-bold text-zinc-500 mt-4 uppercase tracking-[0.5em]">by .ftgs</span>
                        </div>
                        <div class="flex flex-1 overflow-hidden">
                            <div class="w-72 border-r border-white/5 p-8 space-y-4 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-16 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-theme" class="tab-content hidden grid grid-cols-4 gap-6">
            <div class="theme-pill bg-[#121212]" onclick="setTheme('Dark', '#000')">Dark</div>
            <div class="theme-pill bg-white text-black" onclick="setTheme('Light', '#fff')">Light</div>
            <div class="theme-pill bg-[#e11d48]" onclick="setTheme('Rose', '#100000')">Rose</div>
            <div class="theme-pill bg-[#166534]" onclick="setTheme('Plant', '#001000')">Plant</div>
            <div class="theme-pill bg-[#0284c7]" onclick="setTheme('Sky', '#000810')">Sky</div>
            <div class="theme-pill bg-[#059669]" onclick="setTheme('Emerald', '#001008')">Emerald</div>
            <div class="theme-pill bg-[#4f46e5]" onclick="setTheme('Indigo', '#000010')">Indigo</div>
            <div class="theme-pill bg-[#d97706]" onclick="setTheme('Amber', '#100800')">Amber</div>
            <div class="theme-pill bg-[#8b5cf6]" onclick="setTheme('Violet', '#100010')">Violet</div>
            <div class="theme-pill bg-[#b91c1c]" onclick="setTheme('Crimson', '#100000')">Crimson</div>
            <div class="theme-pill bg-[#fb923c]" onclick="setTheme('Monokai Pro', '#1a1a1a')">Monokai Pro</div>
        </div>

        <div id="t-export" class="tab-content hidden h-full">
            <div class="glass h-full flex flex-col">
                <div class="p-8 flex justify-between items-center border-b border-white/5">
                    <span class="text-xs font-bold text-red-600 uppercase tracking-widest">Full Format Lua Source</span>
                    <button onclick="copyFinal()" class="bg-white text-black px-10 py-4 rounded-full text-xs font-black">COPY CLIPBOARD</button>
                </div>
                <textarea id="source-out" readonly class="flex-1 p-12 bg-black/20 font-mono text-sm text-red-500 outline-none scroller"></textarea>
            </div>
        </div>
    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let scriptTheme = "Dark";
        let editingId = null;

        // Fetching all Lucide icons names
        const iconNames = Object.keys(lucide.icons);

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
        }

        function setTheme(name, bg) {
            scriptTheme = name;
            document.getElementById('prev-window').style.backgroundColor = bg;
        }

        function openIconModal() {
            document.getElementById('icon-modal').style.display = 'flex';
            renderIcons("");
        }

        function closeIconModal() { document.getElementById('icon-modal').style.display = 'none'; }

        function renderIcons(query) {
            const container = document.getElementById('icon-container');
            container.innerHTML = '';
            const filtered = iconNames.filter(name => name.includes(query.toLowerCase()));
            filtered.forEach(name => {
                const div = document.createElement('div');
                div.className = 'icon-item';
                div.innerHTML = `<i data-lucide="${name}"></i><p>${name}</p>`;
                div.onclick = () => selectIcon(name);
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function filterIcons() { renderIcons(document.getElementById('icon-search').value); }

        function selectIcon(name) {
            const el = elements.find(x => x.id === editingId);
            if(el) el.icon = name;
            updatePrev();
            closeIconModal();
        }

        function add(type) {
            const id = Date.now();
            const el = { 
                id, type, title: `New ${type}`, desc: "Input description...", 
                code: 'print("Executed Successfully")', tabId: activeTab, 
                min: 0, max: 100, def: 50, options: "Option 1, Option 2", icon: "box" 
            };
            if(type === 'Tab') { el.tabId = id; activeTab = id; }
            elements.push(el);
            updatePrev();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const fields = document.getElementById('editor-fields');
            document.getElementById('node-editor').classList.remove('hidden');
            document.getElementById('icon-trigger').style.display = el.type === 'Tab' ? 'block' : 'none';
            
            fields.innerHTML = `
                <input type="text" value="${el.title}" oninput="updateNode(${id}, 'title', this.value)">
                <textarea oninput="updateNode(${id}, 'desc', this.value)">${el.desc}</textarea>
            `;

            if(el.type === 'Slider') {
                fields.innerHTML += `
                    <div class="grid grid-cols-3 gap-2">
                        <input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)">
                        <input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)">
                        <input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)">
                    </div>`;
            } else if(el.type === 'Dropdown') {
                fields.innerHTML += `<textarea oninput="updateNode(${id}, 'options', this.value)">${el.options}</textarea>`;
            }

            fields.innerHTML += `<textarea class="h-40 font-mono text-xs" oninput="updateNode(${id}, 'code', this.value)">${el.code}</textarea>`;
        }

        function updateNode(id, k, v) { const el = elements.find(x => x.id === id); if(el) el[k] = v; updatePrev(); }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            document.getElementById('prev-author-name').innerText = document.getElementById('ui-author').value;
            
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.className = `p-5 rounded-[25px] text-[10px] font-bold uppercase cursor-pointer flex items-center gap-3 ${activeTab === t.id ? 'bg-white text-black' : 'text-zinc-500 hover:text-white'}`;
                d.innerHTML = `<i data-lucide="${t.icon || 'box'}" style="width:14px;height:14px;"></i><span>${t.title}</span>`;
                d.onclick = () => { activeTab = t.id; updatePrev(); openEditor(t.id); };
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.className = "p-6 mb-4 glass flex justify-between items-center cursor-pointer";
                    d.onclick = () => openEditor(e.id);
                    d.innerHTML = `<div><p class="text-[7px] text-red-600 font-black uppercase mb-1">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4></div><i class="fas fa-edit opacity-10"></i>`;
                    cList.appendChild(d);
                });
            }
            lucide.createIcons();
        }

        function compile() {
            let lua = `-- WindUI Framework Initialization\n`;
            lua += `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            
            lua += `local Window = WindUI:CreateWindow({\n`;
            lua += `    Title = "${document.getElementById('ui-name').value}",\n`;
            lua += `    Author = "${document.getElementById('ui-author').value}",\n`;
            lua += `    Theme = "${scriptTheme}",\n`;
            lua += `    Transparent = true\n`;
            lua += `})\n\n`;
            
            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({\n`;
                lua += `    Title = "${t.title}",\n`;
                lua += `    Icon = "${t.icon}"\n`;
                lua += `})\n\n`;

                elements.filter(x => x.tabId === t.id && x.type !== 'Tab').forEach(e => {
                    lua += `${tVar}:${e.type}({\n`;
                    lua += `    Title = "${e.title}",\n`;
                    lua += `    Desc = "${e.desc}",\n`;
                    if(e.type === 'Slider') {
                        lua += `    Min = ${e.min},\n    Max = ${e.max},\n    Default = ${e.def},\n`;
                    } else if(e.type === 'Dropdown') {
                        lua += `    Options = {${e.options.split(',').map(o => '"'+o.trim()+'"').join(', ')}},\n`;
                    }
                    lua += `    Callback = function(v)\n        ${e.code.replace(/\n/g, '\n        ')}\n    end\n})\n\n`;
                });
            });

            document.getElementById('source-out').value = lua;
            nav('export');
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('source-out').value); alert("V20 Script Copied!"); }
        updatePrev();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKZ | WINDUI V17 EXECUTIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');
        
        :root { --accent: #ff0000; --bg: #030303; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; margin: 0; }

        /* --- BLACKHOLE SYSTEM --- */
        @keyframes suck { 0% { transform: scale(1) rotate(0); opacity: 1; filter: brightness(1); } 100% { transform: scale(0) rotate(720deg); opacity: 0; filter: brightness(5); } }
        .deleting { animation: suck 0.8s forwards cubic-bezier(0.5, -0.5, 0.1, 1.5); }
        .hole { position: fixed; width: 150px; height: 150px; background: radial-gradient(circle, var(--accent) 0%, transparent 70%); border-radius: 50%; z-index: 9999; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: screen; filter: blur(10px); }

        /* --- MODERN SCROLLING --- */
        .scroller::-webkit-scrollbar { width: 4px; }
        .scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .scroller { scrollbar-width: none; overflow-y: auto; }

        /* --- GLASS UI --- */
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; }
        .mac-window { background: #000; border-radius: 40px; border: 1px solid #111; box-shadow: 0 0 50px rgba(0,0,0,1); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* --- THE FLOATING EXPORT BUTTON --- */
        .btn-export-top {
            background: linear-gradient(90deg, #ff0000, #ff4d4d);
            padding: 12px 30px; border-radius: 100px; font-weight: 800; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(255,0,0,0.3);
            transition: 0.3s; cursor: pointer; border: none; z-index: 100;
        }
        .btn-export-top:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 15px 30px rgba(255,0,0,0.5); }

        /* --- INPUTS --- */
        input, textarea { background: rgba(255,255,255,0.03) !important; border: 1px solid rgba(255,255,255,0.08) !important; color: #fff !important; border-radius: 15px !important; padding: 15px !important; transition: 0.3s; }
        input:focus { border-color: var(--accent) !important; background: rgba(255,255,255,0.05) !important; }

        /* --- SWITCH --- */
        .toggle-switch { width: 45px; height: 24px; appearance: none; background: #222; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-switch:checked { background: var(--accent); }
        .toggle-switch::before { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
        .toggle-switch:checked::before { left: 24px; }

        /* --- ELEMENT CARDS --- */
        .el-card { background: #080808; border: 1px solid #151515; border-radius: 20px; transition: 0.3s; cursor: pointer; }
        .el-card:hover { border-color: var(--accent); transform: scale(1.02); }

        #rename-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <div id="rename-overlay">
        <div class="glass-card p-10 w-[400px]">
            <h3 class="text-xs font-bold uppercase tracking-[0.3em] text-red-600 mb-6">Rename Element</h3>
            <input type="text" id="rename-input" class="w-full mb-6">
            <div class="flex gap-4">
                <button onclick="saveName()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-xs uppercase">Confirm</button>
                <button onclick="closeModal()" class="flex-1 bg-zinc-900 py-4 rounded-2xl font-black text-xs uppercase">Cancel</button>
            </div>
        </div>
    </div>

    <aside class="w-80 bg-black/50 border-r border-white/5 flex flex-col p-8 z-50">
        <div class="mb-12 flex items-center gap-4">
            <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(255,0,0,0.4)]">
                <i class="fas fa-ghost text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter italic">DARKZ<span class="text-red-600">V17</span></h1>
        </div>

        <nav class="space-y-4 flex-1">
            <button onclick="nav('build')" class="w-full text-left p-5 rounded-3xl bg-white/5 text-white font-bold text-xs uppercase tracking-widest border border-white/5">Architect</button>
            <button onclick="nav('sec')" class="w-full text-left p-5 rounded-3xl text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Security</button>
            <button onclick="nav('theme')" class="w-full text-left p-5 rounded-3xl text-zinc-500 font-bold text-xs uppercase tracking-widest hover:text-white transition">Cosmetics</button>
        </nav>
        
        <div class="p-6 bg-red-600/5 rounded-3xl border border-red-600/10">
            <p class="text-[10px] text-red-600 font-black uppercase mb-1">Status</p>
            <p class="text-xs font-bold">V17 Stable Engine</p>
        </div>
    </aside>

    <main class="flex-1 p-12 scroller">
        
        <div id="t-build" class="tab-content">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-xs font-black text-zinc-600 uppercase tracking-[0.5em]">Designer Workspace</h2>
                <button onclick="compile()" class="btn-export-top"><i class="fas fa-bolt mr-2"></i> Export Script</button>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-4 space-y-6">
                    <div class="glass-card p-8">
                        <input type="text" id="ui-name" oninput="updatePrev()" value="Darkz Hub" class="!text-3xl !font-bold !bg-transparent !border-none !p-0 mb-2">
                        <input type="text" id="ui-author" oninput="updatePrev()" value="by .ftgs" class="!text-xs !text-zinc-500 !bg-transparent !border-none !p-0">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="add('Tab')" class="p-5 glass-card text-[10px] font-bold uppercase hover:bg-white hover:text-black transition">+ Tab</button>
                        <button onclick="add('Button')" class="p-5 glass-card text-[10px] font-bold uppercase hover:bg-white hover:text-black transition">+ Button</button>
                        <button onclick="add('Toggle')" class="p-5 glass-card text-[10px] font-bold uppercase hover:bg-white hover:text-black transition">+ Toggle</button>
                        <button onclick="add('Slider')" class="p-5 glass-card text-[10px] font-bold uppercase hover:bg-white hover:text-black transition">+ Slider</button>
                        <button onclick="add('Dropdown')" class="p-5 glass-card text-[10px] font-bold uppercase hover:bg-white hover:text-black transition">+ Drop</button>
                    </div>

                    <div id="node-editor" class="glass-card p-8 hidden border-red-600/20">
                        <h3 class="text-[10px] font-bold text-red-600 uppercase mb-6">Live Properties</h3>
                        <div id="editor-fields" class="space-y-6 max-h-[400px] scroller pr-2"></div>
                    </div>
                </div>

                <div class="col-span-8">
                    <div id="prev-window" class="mac-window flex flex-col h-[650px]">
                        <div class="p-12 border-b border-white/5 flex flex-col items-center">
                            <span id="prev-window-name" class="text-5xl font-bold uppercase italic tracking-tighter">Darkz Hub</span>
                            <span id="prev-author-name" class="text-xs font-bold text-zinc-500 mt-2 uppercase tracking-[0.4em]">by .ftgs</span>
                        </div>
                        <div class="flex flex-1 overflow-hidden">
                            <div class="w-64 border-r border-white/5 p-6 space-y-3 scroller" id="prev-tabs"></div>
                            <div class="flex-1 p-12 scroller" id="prev-content"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="t-sec" class="tab-content hidden flex justify-center pt-20">
            <div class="glass-card p-12 w-full max-w-lg text-center">
                <i class="fas fa-shield-halved text-5xl text-red-600 mb-8"></i>
                <h3 class="text-2xl font-bold uppercase mb-10">Protection Suite</h3>
                
                <div class="flex items-center justify-between bg-black/40 p-6 rounded-3xl border border-white/5 mb-6">
                    <span class="text-xs font-bold uppercase tracking-widest">Master Key System</span>
                    <input type="checkbox" id="key-master" class="toggle-switch">
                </div>
                
                <div id="key-settings" class="space-y-4 opacity-50 pointer-events-none transition-all">
                    <input type="text" id="key-string" placeholder="Static Key" class="w-full text-center">
                    <input type="text" id="key-link" placeholder="Discord/Key Link" class="w-full text-center">
                </div>
            </div>
        </div>

        <div id="t-theme" class="tab-content hidden grid grid-cols-4 gap-6"></div>

        <div id="t-export" class="tab-content hidden h-full">
            <div class="glass-card h-full flex flex-col overflow-hidden">
                <div class="p-8 flex justify-between items-center border-b border-white/5">
                    <span class="text-xs font-bold text-red-600 uppercase tracking-widest">Compiled Source Code</span>
                    <button onclick="copyFinal()" class="bg-white text-black px-10 py-4 rounded-full text-xs font-black uppercase">Copy to Clipboard</button>
                </div>
                <textarea id="source-out" readonly class="flex-1 p-12 bg-black/20 font-mono text-sm text-red-500 outline-none scroller"></textarea>
            </div>
        </div>

    </main>

    <script>
        let elements = [];
        let activeTab = null;
        let scriptTheme = "Dark";
        let editingId = null;

        const themeData = [
            { n: "Dark", c: "#ff0000", b: "#000000" },
            { n: "Aqua", c: "#00ffff", b: "#001010" },
            { n: "Lime", c: "#00ff00", b: "#001000" },
            { n: "Rose", c: "#fb7185", b: "#100005" }
        ];

        // MASTER TOGGLE LOGIC
        document.getElementById('key-master').onchange = function() {
            const set = document.getElementById('key-settings');
            if(this.checked) { set.classList.remove('opacity-50', 'pointer-events-none'); }
            else { set.classList.add('opacity-50', 'pointer-events-none'); }
        };

        function nav(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('t-'+id).classList.remove('hidden');
            if(id === 'theme') renderThemes();
        }

        function renderThemes() {
            const grid = document.getElementById('t-theme'); grid.innerHTML = '';
            themeData.forEach(t => {
                const card = document.createElement('div');
                card.className = `p-10 glass-card text-center cursor-pointer transition-all ${scriptTheme === t.n ? 'border-red-600 bg-red-600/10' : ''}`;
                card.style.color = t.c;
                card.innerHTML = `<span class="font-bold uppercase text-[10px]">${t.n}</span>`;
                card.onclick = () => {
                    scriptTheme = t.n;
                    document.documentElement.style.setProperty('--accent', t.c);
                    document.getElementById('prev-window').style.backgroundColor = t.b;
                    renderThemes();
                };
                grid.appendChild(card);
            });
        }

        function add(type) {
            const id = Date.now();
            const el = { id, type, title: `New ${type}`, desc: "Element description goes here", code: '-- Lua Code\nprint("Executed")', tabId: activeTab, min: 0, max: 100, def: 50, options: "Option 1, Option 2" };
            if(type === 'Tab') { el.tabId = id; activeTab = id; }
            elements.push(el);
            updatePrev();
        }

        function openEditor(id) {
            editingId = id;
            const el = elements.find(x => x.id === id);
            const editor = document.getElementById('node-editor');
            const fields = document.getElementById('editor-fields');
            editor.classList.remove('hidden');
            fields.innerHTML = `
                <div><label class="text-[8px] uppercase font-black text-zinc-500 mb-2 block">Display Name</label><input type="text" value="${el.title}" oninput="updateNode(${id}, 'title', this.value)"></div>
                <div><label class="text-[8px] uppercase font-black text-zinc-500 mb-2 block">Description</label><textarea oninput="updateNode(${id}, 'desc', this.value)">${el.desc}</textarea></div>
                <div><label class="text-[8px] uppercase font-black text-zinc-500 mb-2 block">Callback Logic</label><textarea class="h-40 font-mono text-xs" oninput="updateNode(${id}, 'code', this.value)">${el.code}</textarea></div>
            `;
            if(el.type === 'Slider') {
                fields.innerHTML += `
                    <div class="grid grid-cols-3 gap-4">
                        <input type="number" value="${el.min}" oninput="updateNode(${id}, 'min', this.value)" placeholder="Min">
                        <input type="number" value="${el.max}" oninput="updateNode(${id}, 'max', this.value)" placeholder="Max">
                        <input type="number" value="${el.def}" oninput="updateNode(${id}, 'def', this.value)" placeholder="Def">
                    </div>`;
            }
            if(el.type === 'Dropdown') {
                fields.innerHTML += `<div><label class="text-[8px] uppercase font-black text-zinc-500 mb-2 block">Options</label><textarea oninput="updateNode(${id}, 'options', this.value)">${el.options}</textarea></div>`;
            }
        }

        function updateNode(id, k, v) { const el = elements.find(x => x.id === id); if(el) el[k] = v; updatePrev(); }

        function deleteNode(id) {
            const node = document.getElementById(`node-${id}`);
            const rect = node.getBoundingClientRect();
            const hole = document.createElement('div');
            hole.className = 'hole';
            hole.style.left = `${rect.left + rect.width/2}px`; hole.style.top = `${rect.top + rect.height/2}px`;
            document.body.appendChild(hole);
            node.classList.add('deleting');
            setTimeout(() => {
                elements = elements.filter(x => x.id !== id);
                if(activeTab === id) activeTab = null;
                updatePrev(); hole.remove();
                document.getElementById('node-editor').classList.add('hidden');
            }, 800);
        }

        function updatePrev() {
            document.getElementById('prev-window-name').innerText = document.getElementById('ui-name').value;
            document.getElementById('prev-author-name').innerText = document.getElementById('ui-author').value;
            
            const tList = document.getElementById('prev-tabs'); tList.innerHTML = '';
            const cList = document.getElementById('prev-content'); cList.innerHTML = '';

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const d = document.createElement('div');
                d.id = `node-${t.id}`;
                d.className = `p-5 rounded-3xl text-[10px] font-bold uppercase cursor-pointer transition-all ${activeTab === t.id ? 'bg-white text-black translate-x-3' : 'text-zinc-500 hover:text-white'}`;
                d.innerHTML = `<div class="flex justify-between"><span>${t.title}</span><i onclick="deleteNode(${t.id})" class="fas fa-times-circle opacity-20 hover:opacity-100"></i></div>`;
                d.onclick = (e) => { if(e.target.tagName !== 'I') { activeTab = t.id; updatePrev(); } };
                d.ondblclick = () => openRename(t.id);
                tList.appendChild(d);
            });

            if(activeTab) {
                elements.filter(x => x.tabId === activeTab && x.type !== 'Tab').forEach(e => {
                    const d = document.createElement('div');
                    d.id = `node-${e.id}`;
                    d.className = "el-card p-6 mb-4 flex justify-between items-center";
                    d.onclick = (evt) => { if(evt.target.tagName !== 'I') openEditor(e.id); };
                    d.innerHTML = `<div><p class="text-[7px] font-black text-red-600 uppercase mb-1">${e.type}</p><h4 class="font-bold text-sm italic">${e.title}</h4></div><i onclick="deleteNode(${e.id})" class="fas fa-trash text-zinc-900 hover:text-red-600 transition"></i>`;
                    cList.appendChild(d);
                });
            }
        }

        function openRename(id) { editingId = id; document.getElementById('rename-overlay').style.display = 'flex'; document.getElementById('rename-input').value = elements.find(x => x.id === id).title; }
        function closeModal() { document.getElementById('rename-overlay').style.display = 'none'; }
        function saveName() { elements.find(x => x.id === editingId).title = document.getElementById('rename-input').value; updatePrev(); closeModal(); }

        function compile() {
            const keyOn = document.getElementById('key-master').checked;
            let lua = `local WindUI = loadstring(game:HttpGet("https://github.com/Footagesus/WindUI/releases/latest/download/main.lua"))()\n\n`;
            lua += `local Window = WindUI:CreateWindow({\n    Title = "${document.getElementById('ui-name').value}",\n    Author = "${document.getElementById('ui-author').value}",\n    Theme = "${scriptTheme}",\n    Transparent = true\n})\n\n`;
            
            if(keyOn) {
                lua += `Window:KeySystem({\n    KeyValidator = function(val)\n        return val == "${document.getElementById('key-string').value}"\n    end,\n    URL = "${document.getElementById('key-link').value}",\n    SaveKey = true\n})\n\n`;
            }

            elements.filter(x => x.type === 'Tab').forEach(t => {
                const tVar = t.title.replace(/\s/g, '');
                lua += `local ${tVar} = Window:Tab({\n    Title = "${t.title}",\n    Icon = "bird"\n})\n\n`;
                elements.filter(x => x.tabId === t.id && x.type !== 'Tab').forEach(e => {
                    lua += `${tVar}:${e.type}({\n    Title = "${e.title}",\n    Desc = "${e.desc}",\n`;
                    if(e.type === 'Slider') lua += `    Min = ${e.min}, Max = ${e.max}, Default = ${e.def},\n`;
                    if(e.type === 'Dropdown') lua += `    Options = {${e.options.split(',').map(o=>'"'+o.trim()+'"').join(', ')}},\n`;
                    lua += `    Callback = function(value)\n        ${e.code.replace(/\n/g, '\n        ')}\n    end\n})\n\n`;
                });
            });

            document.getElementById('source-out').value = lua;
            nav('export');
        }

        function copyFinal() { navigator.clipboard.writeText(document.getElementById('source-out').value); alert("WindUI Script Copied!"); }
        updatePrev();
    </script>
</body>
</html>
